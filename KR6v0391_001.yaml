body:
  text: 明環中迂叟陳士元輯清靜真居士張海鵬訂梵譯天文類忉利天一名多羅夜離欲也兜率天知足也焰摩天一作夜摩一作炎摩歡樂也印度月也又日月總稱又五天竺國亦稱五印度地婆訶羅日照也毗盧遮耶一曰毗舍那光明徧照也摩利交陽燄也毗嵐婆迅猛風也一曰鞞藍婆一曰吠藍婆一曰隨藍婆葢五天竺音異耳離婆多星宿也尸棄火也盎哦羅迦火星也部陀水星也勿哩訶婆跛底木星也沙乃以宣折囉土星也戌羯羅金星也蘇氣怛羅善星也酉陽雜俎載二十八宿姓似天竺語附錄於此貨多羅角姓也雜俎首昴今改首角屬喜樂天迦旃延亢姓也多羅尼氐姓也二宿不載屬阿藍婆房姓也屬慈氏天迦羅延心姓也屬忉利天遮耶尼尾姓也屬臘師天持父迦箕姓也屬清淨天莫迦還斗姓也不載屬梵嵐摩牛姓也屬梵天帝利迦女姓也屬毗紐天憍居喬切陳如虛姓也單羅尼危姓也三宿不載屬閻浮都迦室姓也屬蛇頭天竭天之子陀難闍壁姓也阿瑟吒奎姓也阿含婆婁姓也馱伽毗胃姓也四宿不載屬鞞耶尼昴姓也屬火頗羅墮畢姓也屬水毗梨佉丘茄切耶尼觜姓也屬日又月之子天婆斯失絺參姓也屬日井姓屬同參炮波羅毗鬼姓也屬木柳姓屬亦同參賔伽耶尼星姓也屬火瞿曇張姓也屬福德天翼姓同虛屬林天迦遮延軫姓也屬毗婆梨帝時序類三摩耶假時也刼波時分也阿那婆達多一曰荼闍它無熱也尸羅清凉也阿耨達無熱惱也尼羅阿迭多戒日也般遮于瑟五年一大會也余嘗著俚言解須臾瞬息之說附錄於此須臾瞬息不久之辭也而釋氏分別甚詳按新婆沙論云百二十剎音察那成一怛剎那六十怛剎那成一臘縛二十臘縛成一牟呼麥多三十牟呼麥多成一晝夜又毗曇論云一剎那譯為一念一怛剎那譯為一瞬六十怛剎那為一羅婆即臘縛譯為一息謂一呼一吸三十羅婆為一摩睺羅譯為一須臾是三十息為一須臾也又僧祗律云二十念為一瞬二十瞬名一彈指二十彈指名一羅預二十羅預名一須臾是十六萬念八千瞬為一須臾也須臾即斯須葢鄒魯方言地理類半支跋山也耆闍崛靈鷲山也山多青石頭似鷲鳥竺法維佛國記云靈鷲山在摩竭提南屬天竺國須彌人鳥山也一名阿耨達山或云即崑崙山道家稱元圃吐蕃稱亦耳麻不剌山釋道安西域志云摩訶賴國有阿耨達山王舍城在山東南角竹園精舍在城西蘇迷慮須彌最高處也諾矩羅鼠狼山也屈屈咤播陀雞足山也額溫縛拏馬耳山也楞伽淨山也一作䮚迦折羅漫雪山也達爾達識他般葱嶺也一曰極嶷山中有渴槃陀國阿濕麼石也婆婆石無名異也阿迦水也提洲也閻浮提勝金洲也殑音兢伽河天堂河也一曰恒伽河此河從天堂而來恒河東面金象口而出流入東海信度河驗河也從阿耨池南面銀牛口而出流入南海徙多河冷河也一曰蔔义河從阿耨池西面琉璃馬口而出流入西海縛芻河清河也一曰博义河從阿耨池北面頗黎獅子口而出流入北海伽毗黎河恒河也婆竭羅鹹海也婆悉蒲類海也補陀落迦海島也賀羅䭾池也摩訶波多磨龍池也在迦濕彌羅國西阿耆婆濔火池也在泥婆羅國南波那林也婆羅林堅固林也在叨剌拏河西如來涅槃之所貧婆叢林也謂眾僧聚處如大樹叢叢枝幹團結也烏仗那苑也羅閱祗伽羅王舍城也拘尸那角城也伽耶山城也邏挲樂些城也婆羅尼斯番江繞城也䭾都界也蔑戾車邊地也赭時石國也在大宛北伊粟陀滑國也在桑乾北弭秣賀米國也都那密水西阿濫密穆國也都烏滸水西屈霜你迦何國也都那密水南康居舊地徒里掘驃國也在東天竺東榜葛剌東天竺國也沼納勃中天竺國也並見吾學編摩伽陁南天竺國也見洛陽伽藍記伽毗羅西天竺國也見記聞迦闍那北天竺國也見酉陽雜俎烏仗邦烏篤國也在中天竺南杜婆一曰闍婆訶陵國也在婆利國西犁靬大秦國也即海西國朱俱波一曰朱居槃子合國也在疎勒南特拘夢粟弋國也在安息北尸棄尼識匿國也即瑟匿國業波乾陀國也在烏萇西蘇伐剌拏瞿羅東女國也在吐蕃西沛利車離國也居沙奇城屬天竺跋祿迦亟墨國也即姑墨國屈支龜茲國也即邱兹一作屈茨在且末北烏孫南颯秣建一作薩末鞬康國也即康居在大宛西北脂那一作支那文物國也總稱華夏宋史太平興國初天竺王沒徙曩遣使上書譯云近聞支那國內有大明王威力自在又云伏願支那皇帝福慧圓滿又曰真丹一作真旦一作振旦涅槃經一作震旦樓炭經注云葱嶺以東名為震旦以日初出耀乎東隅也唐書貞觀十五年中天竺王尸羅逸多自稱摩伽佗遣使上書帝使雲騎尉梁懷璥持節慰撫王喜曰摩訶震旦亦有使者至吾國云云多羅岸也一曰息多波羅蜜到彼岸也彼岸指樂地喻眾生輪廻苦海沉溺此中諸佛所在謂之彼岸徐士英金剛經口義云波羅蜜訓為到彼岸似於字義猶有遺論葢波羅蜜乃樹名此樹生實甘美言聞經悟道者眾苦俱忘而甘美如蜜也磨磨迦羅我所也鬱單越勝處也畢利义高顯處也毗阿羅遊止處也支提可供養處也林微尼解脫處也瞿曇地最勝處也婆羅林高遠處也差羅波尼灰水也剎摩一曰掣多羅丈田也拘盧舍二里也由旬十六里也踰繕那四十里也一驛地尸多婆那一曰尸陀寒林也天竺棄尸處舍磨奢那塚也窣堵波方墳也又圓墳或云塔也余嘗考天竺疆域附錄於此按杜氏通典云天竺後漢通焉即身毒國從月氏高附國以西南至西海東至盤起皆身毒之地有別城數百城置長有別國數十國置王雖各小異而俱名身毒唐書天寶初中天竺王尸羅逸多死國亂其臣阿羅那順篡立時右率衛府長史王元䇿奉使至彼拒不得入乃檄吐蕃西鄰諸國兵破之降城五百八十餘所東天竺王尸鳩摩送牛馬三萬犒軍迦沒路國獻地圖譜則合計五天竺之城葢不止杜氏所謂數百而已漢書云捐毒國去長安九千八百里師古云捐毒即身毒身毒即天竺也續漢書云天竺即身毒在大月氏東南扶南傳云伽尸國一名波羅柰柰一作祭國一名伽波羅柰斯國屬天竺竺法維佛國記云波羅柰國在伽維羅越國南千四百八十里又釋道安西域志云波羅柰斯國佛轉法輪處摩揭它傳云摩揭它一作摩伽陁屬中天竺王居拘闍揭羅布羅城一曰俱蘇摩補羅一曰波吒釐城北瀕殑伽河又有烏茶亦屬天竺東距勃律六百里西距罽賔四百里有五城王居術瞢蘖利城一曰瞢揭釐城東北有達麗羅川即烏萇舊地梁天監初天竺王屈多遣其臣竺羅達來貢羅達言其國臨大江新陶源出崑崙分為五江總名恒水元魏書云南天竺國去代州三萬一千五百里馬氏通考云宋乾德三年滄州僧道圓自西域還得佛舍利及貝葉經四十夾道圓自天福中往西域在塗十二年往五印度凡六年五印度即五天竺也太祖召問所歷風俗山川道里一一能記太平興國初天竺僧施護能以華言譯梵書施護乃烏填曩國人自言其國屬北印度西行十二日至乾陀國又西行二十日至曩誐囉賀囉國又西行十日至嵐婆國又西行十二日至誐惹曩國又西行至波斯國得西海自北印度行百二十日至中印度中印度西行三程至阿囉尾國又西行十二日至末曩囉國又西行十二日至鉢賴野迦國又西行六十日至迦囉拏俱惹國又西行二十日至摩囉尾國又西行二十日至烏然尼國又西行二十五日至囉囉國又西行四十日至蘇囉茶國又西行十一日至西海自中印度行六月程至南印度又西行九十日至供迦拏國又西行一月至海自南印度南行六月程至南海云雍熙中衛州僧辭澣自西域還與婆羅門僧永世波斯國外道有法術之稱阿里煙同至京師永世自言本國名利得國王姓牙羅午得名阿喏你縛王妃曰摩訶你其國東行經六月至大食國阿里煙自言本國王號黑衣姓張名哩沒其國東行經六月至婆羅門又石湖范氏吳船錄云乾德二年詔沙門繼業姓王氏耀州人等三百人往天竺求舍利及貝多葉至開寶九年始歸得涅槃經一函四十二卷繼業於每卷後分記西域行程自階州出塞西行由靈武西凉甘肅瓜沙等州入伊吾高昌焉耆于闐疎勒大食諸國度雪嶺至布路沙國又度大葱嶺雪山至伽濕彌羅國西登大山有薩埵太子投崖飼虎處遂至健他羅國謂之中印土即中印度又西至庶流波國及左欄陀羅國國有二寺又西過四大國至大曲女城南臨滔牟河北近恒河塔廟甚多而無僧尼又西二程有寶階故基又西至波羅柰國兩城相距五里南臨恒河又西北十許里至鹿野苑塔廟佛跡更多南行十里渡恒河河南有大浮屠自鹿野苑西至摩揭提國館於漢寺南與杖林山相對山北有優波掬多石室及塔廟故基西南百里孤山三峯名雞足是迦葉入定處又西北百里有菩提寶座城四門相望金剛座其中東向又東至尼連禪川東岸有石柱記佛舊事自菩提座東南五里至佛苦行處又西三里至三迦葉村及牧牛女池金剛座之北門外有師子國伽藍又北五里至伽耶城又北十里至伽耶山是佛說寶雲經處又自金剛座東北十五里至正覺山又東北三十里至骨磨城館於鰕羅寺謂之南印土諸國僧多居之又東北四十里至王舍城東南五里有降醉象塔又東北登大山有舍利子塔臨澗冇下馬迎風塔山頂有大塔廟是七佛說法處山北平地又有舍利本生塔其北山半曰鷲峯是佛說法華經處山下即王舍城城北山趾有溫泉二十餘井又北有大寺及伽蘭陁竹園故跡又東有阿羅半身舍利塔溫泉西有平地直南登山腹有畢鉢羅窟窟西有阿難證果塔此去新王舍城八里有樹提迦故宅城其西有輪王塔又北十五里有那爛陁寺寺之南北各有數十寺門皆西向其北有四佛座又東北十五里至烏巔頭寺東北五里有聖觀自在像又東北十里至伽濕彌羅寺寺南距漢寺八里許自漢寺東行十二里至却提希山又東七十里有鴿寺西北五十里有支那西寺古漢寺也西北百里至花氏城育王故都也自此渡河至毗耶離城有維摩方丈故跡又至拘尸羅城及多羅聚落踰大山數重至泥波羅國又至磨逾里過雪嶺至三耶寺由故道入階州余謂通典槩舉天竺城國之數而不言其鄰界施護永世阿里煙輩秪以日月計程而不備言所歷之國繼業所記僅述佛祖修行說法滅度之處而五天竺之疆域邈乎未及也余又讀劉氏舊唐書則謂天竺在葱嶺西北去月氏西南數千里一名磨迦陀又曰婆羅門地方三萬餘里其中分為五天竺一曰中天竺二曰東天竺三曰南天竺四曰西天竺五曰北天竺地各數千里城邑各數百南天竺際大海北天竺距雪山四周有山為壁南面一谷通為國門東天竺東際大海與扶南林邑相鄰但隔一小海耳西天竺與罽賔波斯接壤中天竺據四天竺之會其都城週廻七十餘里北臨禪連河南州異物志亦云天竺國地方三萬里尚佛道其國王城郭宮室皆雕文刻鏤唐書又云乾封三年五天竺皆來朝開元時北天竺來朝中天竺南天竺各遣使入貢葢五天竺各有境土中國稱彼為西天而彼則自以中天竺為天地之中也及考大明一統志所載外夷諸國會典所載朝貢諸番與夫瀛涯勝覽海槎錄等書並無天竺國名故今時五天竺境土廣袤東西曰廣南北曰袤無得而詳焉人品類遮閱那王也因陀羅天王也毗沙門子多聞天王也提和羅那天人王也摩訶三摩阿邏遮太平等王也提多羅吒治國主也摩㝹奴鈎切含喃人也含多提婆魔㝹含喃天人教師也般遮于旬五神通人也呾你也僕呼繕那眾生也僧伽眾多也又和合也後省伽字止稱僧自四人以上謂之僧今一人亦稱僧者從合眾之義猶萬二千五百人稱軍一人亦稱軍也摩訶僧祗大眾也摩摩帝寺主也富樓沙曇藐婆羅提調御師也須菩提長老也阿闍梨耶一作阿遮梨夜軌範也謂能糾正弟子所行後省阿耶字止稱闍梨鐸曷攞小師也宣灑弟子也阿夷怡一曰韋提希新學也鄔波遮迦和尚也羯麼陀知事僧也婆羅沙伴僧也善男子初出家之稱比邱乞士也謂乞法諸佛資益慧命乞食施主資益色身優婆塞一曰伊蒲塞一曰鄔婆索迦善男子也即清淨士優婆夷一曰鄔婆斯迦善女人也式义摩那學法女也此名尼鄔波三鉢那近也比邱初受戒之稱室羅末尼永寂滅度也比邱落髮之稱桑門勤息也取勤行善息之義本名宣摩那拏訛為沙迦懣曩省迦字止稱沙懣曩又訛為沙門那又省那字止稱沙門後又訛為桑門耳沙彌息慈也落髮僧之稱息慈謂安息於慈悲之地一云息惡行慈也杜多抖擻也謂抖擻貪嗔癡而捨之也訛稱頭陀婆羅門淨行也娑羅沙僧受戒也迦羅越居士也耆婆活醫師也陀那鉢底施主也訛陀為檀省鉢底字止稱檀那又稱檀越者謂此人行檀能越貧窮海也逋沙丈夫也鄔婆弟鑠父母也闍黎哆祖父也波帝夫也婆梨耶婦也拘摩羅童子也提陀庶民也半擇迦黃門也唐人無子之稱有五種其一般吒半擇迦般吒滑冷也有男根用而不生子其二伊利涉半擇迦伊利涉妬也謂行欲即發不行即無亦具男根而不生子其三扇榹丑皆切半擇迦扇榹弱也謂本來男根不滿亦不能生子其四博义半擇迦博义二形也謂半月有男形半月則女形其五留拏半擇迦留拏割也謂被宮刑者以上並大般若經注余聞世人有天騸者木來男根完具但痿廢不舉耳佛經遺此扇提羅石女也婆里力士也柘羯戰士也罽賔賤種也䭾孛迦奴也䮢𩤥排戲人也一曰根肖速魯柰柰旃陀羅屠人也羯耻那煮狗人也烏芻瑟摩爨火人也吃栗賤人也摩鄧迦娼女也又稱尋香人旃羅含男色也鳩羅惡人也朱利草賊也佛號類佛覺也一曰佛陀一曰浮屠一曰部多一曰母䭾一曰沒陀葢五天竺音異耳路史發揮云臨猊國王太子名浮屠即佛也釋氏要覽云佛小名天中天菩提薩埵菩提覺也薩埵有情也省提埵字止稱菩薩謂覺有情也凡有生者皆有情菩薩乃有情之中覺者也佛有覺性而無情菩薩則不免有情故謂之覺有情多陀阿伽陀度如來也路迦那他世尊也摩訶薩大菩薩也謂能救度人大有情也南無一曰那謨一曰南摩諸佛世尊號也即皈命信從之義釋伽牟尼佛能仁寂默也默一作照迦葉波飲光佛也袍休蘭羅大寶也是為多寶佛阿彌陀佛無量壽也一曰無量清淨是為普光功德山王波頗智光佛也提洹竭然燈佛也提婆達天授佛也伊濕伐邏自在佛也毗含一切自在佛也修跋拏婆頻婆鬱多摩金光明佛也鞞崽音宰無勝佛也祗陀洹戰勝佛也頞鞞馬勝佛也蘇達梨含那善現佛也阿奢理貳奇特佛也柯檀一曰阿捺摩無我佛也阿斯陀無比佛也又曰端正阿羅闍無垢佛也婆娑提伽一曰梵摩清淨佛也毗棃耶一曰禪那精進佛也羼初莧切提忍辱佛也剌那伽羅寶積佛也般若拘羅智積佛也鉢底婆辨才佛也波毗畎伽清辨佛也阿濕縛窶生馬鳴大士佛也尊者又有馬鳴辟支佛獨覺也阿難佛無苦也阿育佛無憂也阿育國名摩訶那鉢大勢至菩薩也是為善住功德寶王陀那婆羅吉低輸觀世音菩薩也文殊師利菩薩妙法也邲輸跋陀一曰三曼跋陀普賢菩薩也達磨波羅護法菩薩也曇摩耶舍法稱菩薩也曇摩識法豐菩薩也曇無竭法勇菩薩也阿迦雲藥王菩薩也舍利弗尊者鶖鷺子也舍利有二說佛之舍利取堅固之義尊者之名則曰鶖鷺子龍舒心經注云舍利弗即舍利子乃佛弟子名也以其母眼似舍利鳥之眼故因其母而立名舍利鳥即鶖鷺其眼圓因以舍利稱其母所謂舍利子者猶言婦人舍利者之子也阿羅漢尊者遠離諸惡不受三界生也攝拖苾䭾尊者聲明也佛陀那舍尊者覺明也佛陀跋陀羅尊者覺賢也菩提流支尊者覺孝也鞞侈遮羅那尊者行足也彌跋陀羅尊者好賢也尸羅跋陀羅尊者戒賢也摩訶摩耶尊者大術也鳩摩羅什神僧童壽也尊者亦有鳩摩羅什余聞釋家誦三十五佛五十三佛之號矣稱佛而三五數之也何故哉又讀諸佛世尊如來菩薩尊者神僧名經諸佛始釋迦牟尼終攝取光明寶臺凡七千六百八十三世尊始妙樂上德終須彌山王凡十有二如來始寶蓮華步終寶生德凡六千七十有六菩薩始初會無量終大意聲王凡三千二百五十五尊者始吉祥蜜終嚕呬尼聖堅寶貴凡七百四十五神僧始摩騰終膽巴凡二百有七合計萬有八千六百七十有七而諸佛如來菩薩尊者名多重複葢釋家模擬杜撰之作不待辨駁矣又佛經有三千人成佛者前千佛始光華佛終毘舍中千佛始拘樓孫佛終樓至如來後千佛始日光如來終須彌相與名經又迥異云姓氏類佛父臨猊國王名屑頭耶母名莫耶後人改佛父曰淨梵王母曰摩耶非也摩耶是其祖名佛未出家時娶妻曰耶輸佗生子曰摩睺羅出家十二年歸妻子復聚居今僧徒無妻非佛本教也阿彌陀佛姓憍尸迦毗婆尸佛尸棄佛毗舍佛俱姓拘若利拘留孫佛拘那含牟尼佛迦葉佛俱姓迦葉釋迦文佛姓剎利一曰瞿曇氏小字頓吉訛為悉達彌勒佛姓慈氏一曰燕氏名阿逸多一祖摩訶迦葉姓婆羅門一曰摩訶迦葉波大龜氏也大目犍連亦稱目連姓采菽名胡豆一名萊服根須菩提名鳩留產即善現二祖阿難即阿難陀姓剎利三祖商那和修姓毘舍多名舍那婆斯四祖優波多一作優婆毱多姓首陀七祖婆須蜜一作婆須蜜多姓頗羅墮八祖佛陀難提姓瞿曇九祖伏䭾蜜多姓毗舍羅十一祖富那夜奢姓瞿曇十二祖馬鳴大士名功勝十五祖迦那提婆姓毗舍羅十八祖迦耶舍多姓蔚頭藍十九祖鳩摩羅多姓婆羅門二十一祖婆修盤頭姓毗舍佉二十三祖鶴勒那姓婆羅門震旦初祖達磨一名菩提多羅姓剎利一作剎利帝自二祖慧可至六祖惠能以及南北二宗諸禪師皆中華姓氏佛圖澄姓帛一曰姓濕神鬼類蘇利耶日神也蘇摩月神也婆庾風神也惡祁尼火神也那羅延一曰䟦折羅金剛神也提婆犀那天軍也是為陰兵乾闥婆香陰也是為天樂神阿修羅無端正也是為非天神緊那羅疑神也似人頭有角琰魔一曰閻羅靜息也閻羅王名閃多閃一作閦夜义勇健鬼也羅剎連疫鬼也波旬一曰波卑夜惡鬼也鳩槃茶魔鬼也其形似甕毗舍闍顛鬼也薩迦耶薩無常也泥梨耶無喜樂也泥梨迦無去處也二者皆地獄名或省耶迦字止稱泥梨一作泥犂阿鼻無間也亦地獄名法華經云無間地獄有頂天堂寶星經序云擊大法鼓響振於無間吹大法螺聲通於有頂身心類舍利骨身也頻婆帳身影也便善那文身也烏瑟膩沙佛頂也母陀羅結印手也賔伽羅青目也拘絺羅大膝也波羅毛竅也摩羅鬘也勝鬘多髮也罽那尸棄寶髻也毗迦羅金頭也又黃髮鴦崛摩那指鬘也西方惡人殺人取指為鬘優陀那丹田也頞部曇胞也質多耶心也紇利陀耶肉團心也乾栗陀耶真實心也魔登伽本性也䭾摩法性也耆婆一曰何耆毗伽耶命也婆闍尼娑婆咻聲音也娑路多羅戍縷多耳能聞也砥若時吃縛口能嘗也迦羅尼羯羅拏鼻能嗅也伊羅臭氣也末那一曰摩賖意也摩奴一曰曷利他如意也鉢剌婆剌拏隨意也阿差末無盡意也塞健陀蘊也末提希思惟也毗跋耶斯四念處也䭾那演那靜慮也菴摩羅清淨識也天底慧也婆藪天慧也羯吒斯愛也提鞞沙嗔恚也慕何癡也阿羅伽欲也薩婆迦摩樂欲也波斯匿和悅也尼坻願也彌羅慈也沙彌息慈也注見人品類迦樓那悲也浮曇末至誠也地底迦有愧也都羅喜也阿難歡喜無患苦也佛祖名難陀善歡喜也婆羅力也迦摩羅黃病也阿薩闍不可治病也珊若婆廢風病也人事類羯磨一作揭摩事也又業也伊帝自多伽本事也末伽道也陀羅一曰阿陀耶執持流布也執持是自行流布是化眾陀羅尼緫持也尼毗迦與也達嚫財施也修檀能布施也薩縛達一切施也須達多善施也那爛陀施無厭也毗婆含那觀也毗婆尸勝觀也阿羅訶止觀也又供應也又殺賊也求那跋陀羅功德也俱留孫所應斷也奢摩它止也唄音敗止斷一切外事也遮羅帝動也賔頭盧不能動也懺摩一曰义摩忍也索訶一曰娑婆能忍也多羅救也婆陀縛也盂蘭一曰烏藍倒懸也烏藍婆拏救倒懸也設盂蘭盆自目連救母始波利一曰三跋羅護也阿羅蜜遠離也三昧定也又正受也三摩提正心行處也一切禪定攝心者皆稱三摩提蘇盧都訶決定也波羅伽同豆佉苦也勒沙婆苦行也乾陀訶提不休息也阿鞞跋致一作阿惟越致不退轉也般舟佛立也遮梨夜行也路迦憊世間解也波羅木义一曰目帝羅解脫也波羅提木义別解脫也毗遮羅伺也毗怛迦尋也膩地依也瑜伽師地相應也三跋致發趣也槃那寐訛曰和南我禮也那謨悉羯羅禮拜也路伽耶順地也逆路伽耶左世也阿那遣來也入息般那遣去也僧柯慄多弭有為也涅槃無為也涅言不生槃言不滅取圓寂滅度之義釋伽經云涅槃乃不生不死之地一切修行之所依歸又佛教施燈文云願一切眾生皆得涅槃微妙光明葢謂修行至涅槃者乃有微妙光明或誤云死非也陀呵燒也茶毗焚燒也一曰那維一曰闍毗一曰闍維一曰闍鼻多亦五天竺音異耳要覽云天竺第九祖入滅眾以香油旃檀闍維真體注云闍維焚燒也經典類修多羅一曰素怛纜經也毗柰耶一曰毗尼律也奢薩怛羅一曰阿毗曇論也俱含藏也離伽書也波陀句也跋渠品也三牟提耶集也縛卷也藏經記天竺多羅樹葉書二百四十縛謂貝葉經二百四十卷也和伽那授記也和波陀語言也迦羅作者也毗婆闍婆提分別論也鼻婆沙種種說也毗婆沙廣解也毗勒篋藏也呾多所謂也阿波陀譬喻也阿含一曰阿笈多教也又法歸也娑婆訶善說也又解去也阿施義也純陀妙義也波羅末陀第一義也阿毗曇無比法也波羅末陀訶真諦也摩訶袒持大祕要也曇無德一曰曇摩毱多法蜜隱覆也又法藏也犍度一曰婆犍圖法聚也韋陀智論也伽佗誦也祗夜重誦也梵唄天竺音也又讚歎也陳思王曹子建遊魚山忽聞空中梵天之音張若祖詩云乘虛感靈覺魚山振思童指子建也毗佛略方廣也首楞嚴健相也維摩經維摩詰所說法也薩達磨芬陀利妙法蓮華經也心經阿耨多羅三藐三菩提無上正等正覺也楞伽經佛在楞伽山所說法也達磨示慧可曰吾觀震旦所有經教惟楞伽四卷可以印心揚用修云從佛出十二部經從十二部經出九部修多羅從九部修多羅出方等從方等出摩訶般若從摩訶般若出大涅槃寺宇類佛陀寺也一名仁祠一名寶坊一名仙陀一名香阜一名柰園一名鹿苑一名精舍首陀羅浮居也布薩淨位也羅摩院也阿蘭若空淨處也省阿字止稱蘭若健陀俱胝音知香室也滿茶邏壇也拘吒迦小舍也曷剌怛那揭婆寶臺也拓鬬提奢本言四方僧物也訛拓為招省鬬奢字止稱招提後以為寺院之號僧伽藍摩一曰僧伽羅摩本言眾園也園者生植之所佛弟子居之取生植道本成就聖果之義省僧摩字止稱伽藍後亦以為寺院之號浮圖一曰佛圖塔也聚相也器物類蜜奢兜金鼓也薩怛多般怛羅白傘葢也優檀那印也婆利曲鈎也薩闍羅婆白膠也佉梨斛也婆訶篅也受二十斛篅市專切𥫱也犍椎鍾磬也或云凡金石竹木之類有聲可以集眾者皆稱犍椎隙棄羅錫杖也軍持一曰捃稚迦瓶也寄歸傳云軍持有二甆器是淨用銅鐵器是濁用鉢塞莫數珠也此接引下根牽果修業之具鉢多羅應器也即鉢類健𨩲淺鐵鉢也俱夜羅隨鉢器也優曇華瑞鉢也法華經注云優曇華鉢名瑞應三千年一現現則金輪王出鉢羅奢法形坐位也尼師但那一曰尼師壇那坐具也剎瑟胝竿也即幡柱省瑟胝字止稱剎西域沙門得一法者即建幡以告四遠其建幡之柱謂之剎今以寺院稱剎非也脫闍幢也鉢里薩羅述拏濾水羅也屈眴大細布也撒哈剌毛布也蘇何繭也昔慧達晝在高塔說法夜入繭中故稱為蘇何聖薩遮尼乾離繩索也阿赤榨油木器也末擦眵羅雄黃也珍寶類蘇伐羅金也阿路巴銀也鉢擺婆福羅珊瑚也阿濕摩羯婆琥珀也牟婆洛揭拉婆車渠也摩羅伽𨽾瑪瑙也沒爹蝦囉真珠也摩尼珠離垢珠也鉢摩羅伽赤色珠也甄叔迦赤寶也吉田羅瓔珞也即菩薩鬘樂府有菩薩蠻或菩薩鬘之訛耳迦婆羅刼貝也衣服類震越衣服也彌訶金帶也亟縛屣鞾也僧伽梨重複衣也迦絺那功德衣也迦羅沙曳僧衣也省羅曳字止稱迦沙葛洪撰字苑添衣作袈裟或從毛作毠㲚一名無垢衣一名忍辱鎧一名銷瘦衣一名離塵服一名蓮花服一名福田衣一名水田衣一名稻畦帔一名逍遙服一名無塵衣一名去穢衣一名離染服鬱多羅僧上著衣也即七條衣阿梨跋摩摩師子鎧也求那跋摩功德鎧也蘇幕遮油帽也安陀會中宿衣也鉢吒縵條也一幅㲲成僧祗支掩腋也泥縛些那裙也舍勒內衣也憍奢耶蟲衣也謂蠶所成迦鄰院細錦衣也兜羅綿細香衣也欽跋羅毛衣也頭鳩羅細布衣也芻摩麻衣也那波吒絹衣也毗伽羅衣也飲食類搠羅脫因一曰撒速西天飯食也頭檀淨飯也禿禿麻手撇麵也馬思訶白酥油也優留曼陀大醍醐也摩偷义宰唎翻酒也阿剌吉清酒也速耳麻撥糟酒也逋沙他齋也僧食名齋者取齋戒之義齋者齊也日未中與過中皆不齊故不食烏晡沙他受齋也蒲闍尼正食也佉闍尼不正食也半者蒲善尼五噉食也謂飯乾飯魚肉邸正食也半者珂但尼五嚼食也謂枝葉花果細末磨食即不正食也佉陀尼可食物也鉢和羅自恣食也分衛乞食也但鉢那也音炒糗也鞞鐸佉嚼楊枝也鳥獸類芻尼雀也摩由邏孔雀也迦陵一曰頻伽比翼鳥也又名共命鳥又名妙聲鳥釋迦譜序云馥薝蔔而無異鳴迦陵而不殊迦樓羅金翅鳥也于闐稱鱗舍利鳥鶖鷺也嘶那夜鷹也臊陀鸚鵡也僧婆鴈也舍羅百舌鳥也迦頻闍羅雉也迦布德迦鴿也鳩鳩咤雞也迷力波佉鵝也韃靼稱阿剌渾舍那扎扎多鴨也土番稱速速兒斫迦邏婆鴛鴦也姑栗陀鷲也揭羅闍鵰也阿梨耶鴟也迦耶象也家囉象牙也僧伽彼獅子也阿濕婆馬也瞿摩帝牛也留拏瞿摩稍割牛也釋法盛歷國傳云天竺有稍割牛黑色角細長十日一割否則病或至死人服牛血壽五百餘歲婆蹉富羅犢子也朅伽犀也祗密犀角也蜜利迦羅鹿也東夷稱好剌悉伽羅野牛也瞿盧折娜牛黃也闍卜羅豹也東夷稱失剌孫舍舍迦兔也摩斯咤獼猴也阿慈勃他你膃肭臍也底栗車緫稱畜生也那伽龍也那伽曷樹那龍猛也宮毗羅蛟也叔叔邏虬也摩睺羅伽大蟒也毗囉拏羯車婆龜也摩竭鯨也失收摩羅鰐也金摩竭椒圖也龍種花木類布瑟波花也俱蘇摩羅鬘花也西域用俱蘇摩羅花結為條貫無問男女身首皆以此莊嚴凡經中稱華鬘天鬘寶鬘皆指此花弗把提天花也曼陀羅雜花也優鉢羅黃白色花也薝蔔一作瞻蔔一作瞻博黃色香花也形如梔子翦刀六出刻房七道芬陀利一曰奔茶利白蓮花也鉢特摩一曰波頭摩赤蓮花也拘某陀一曰拘母陀一曰俱物頭一曰俱牟陀黃蓮花也漚鉢羅一曰烏曇跋羅一曰優曇鉢羅一曰嗢鉢摩青蓮花也含樓伽藕根也兜羅綿楊花也末利花柰花也婆力义一曰畢鉢羅樹也貝多葉也即菩提樹葉經云貝多葉下思惟樹故菩提樹一名思惟樹大業拾遺記云西域有貝多樹其葉長五六寸闊五寸許形似琵琶而厚大用以書經阿輸迦無憂花樹也尼拘陀無節樹也尸利灑合昏樹也頗羅果也菴羅王樹果也舊以菴羅為柰非是此果花多而結實甚少其葉似柳果形似梨西域以為王樹謂王城種之也經中生熟難知以此為喻菴羅女持園施佛罔以為名頻婆相思果也訶梨勒天王持來果也毗梨勒三果也三果似胡桃播囉師胡桃也篤迦栗也鎮頭迦柿也居𠻱迦李也婆田羅棗也軻梨羅若梗木也阿勒勃皂莢也芘蒭香草也污栗䭾草木心也婆羅羅花草重生也睒婆一曰迦婆羅木綿也吉貝斑布樹也迦師錯麥也澁勒竹也𩾲戶骨切鶻同義路戰娜竹黃也薩裒煞地蛇藥也興渠阿魏也一曰形虞一曰阿虞一曰哈昔泥一曰穩展盖各國稱名不同耳一統志云西番有草根株獨立枝葉如盖臭氣逼人生取其汁熬膏成阿魏又云三佛齊國有樹不甚高納竹筒於樹梢脂滿其中冬月破筒取脂即阿魏也酉陽雜俎云阿魏出伽闍那國即北天竺也伽闍那呼為形虞亦出波斯國波斯呼為阿虞樹長八九尺皮色青黃三月生葉似鼠耳無花實斷其枝汁出如飴久乃堅凝名阿魏又摩伽陀國僧提婆言取汁和米豆屑成阿魏唐本草注云阿魏體性極臭而能止臭亦奇物也又海藥本草云阿魏生崑崙國木液如桃膠黃色為上黑不堪用揭羅婆波律膏也樹脂答必納龍膽草也沙乞牟一曰沙吉木蔓菁根也給㪍羅剌蜜草也生恒河沙中多骨一曰蘇泣迷羅豆䓻也跛者乃菖蒲也塞鼻力迦苜蓿也因達羅喝悉哆白芨也闍莫迦芎藭也苫彌枸𣏌根也即地骨皮室利薜也瑟得迦松脂也咄者桂皮也目萃哆香附子也苦彌哆甘松也薩利殺跛芥子葉也婆你馬芹也那伽雞薩羅龍華須也並出金光明經昧履支胡椒也毗陵茄蓽澄茄也浮爛囉勒厚朴也出法苑珠林香色類乾陀羅耶香也梅檀娜旃檀香也即離垢香出崑崙盤盤國華嚴經云牛頭旃檀香從離垢出若以塗身火不能燒杜嚕薰陸香也即羅香又名馬尾香出天竺者多白色出邯祁國者夾綠色䅽音榖蒲伊蘭賽蘭香也即伊蒲西域以之供佛後漢書伊蒲之供是也或云即菖蒲花世不恒有貴其難得耳經云天末香莫若旃檀天澤香莫若薰陸天華香莫若伊蘭注云天末者為末而爇之天澤者濕爇之天華者以生蕋露蕾供佛也迦音閉一曰多摩羅跋一曰鉢怛羅藿香也多伽羅根香也並出釋氏會要咄嚕瑟劍蘇合香也突婆茅香也羯布羅龍腦香也出波律國樹高八九丈有脂乾脂為龍腦香清脂為波律膏莫訶婆伽麝香也多揭羅芸香也魚豢典略云芸香辟紙魚蠹阿伽嚧一曰惡揭嚕沉香也多揭羅零陵香也索瞿者丁子香也即母丁香柰剌柁葦香也矩琵佗乃青木香也拙貝羅一曰求求羅安息香也出波斯國其樹名辟邪長三丈許刻皮出膠如飴名安息香此香非出安息國不知何以得名數低茴香也茶矩磨鬱金香也出大秦國魏略云春月開花如紅藍夏月採之其香十二葉為百草之英必栗化木香也內典云化木似老椿葉落水中魚暴死其香亦辟蠹魚俱蘭吒色也耶輸陀羅華色也伊泥延金色也蘇樓沙妙色也尼羅青也阿羅那赤也盧醯咀迦一曰迦沙野同叔羅白也迦茶里一曰訖里瑟拏黑也健陀羅黃也羅差紫也氷伽羅蒼也迦私光也歌羅邏凝滑也麗猘毗細滑也迦留陀夷黑光也余嘗讀佛經及雜記所稱香名似西域語者附錄於此楞嚴經有兜婁婆香法華經有須曼羅花香闍提花香羅羅花香曼陁羅花香殊沙花香拘鞞陁羅樹香又異物志有兜婁香云出海國扶南記有區撥摩花香云出頓遜國魏略有兜納香云出大秦國廣志有迷迭香云出西域酉陽雜俎有預勃黎陁香云出波斯國四裔考有阿薩那香云出康居國有揀香云出越底延國拾遺記有茵墀香云出西域漢武帝內傳有兜末香云出兜渠國唐太宗實錄有拘物頭花香云出罽賔國諸香名可考者惟曼陁羅為雜花拘物頭為黃蓮花耳其餘不知譯為何名姑闕疑以俟知者籌計類含羅籌也僧祗一作僧胝數也僧伽論一曰僧企耶數術也般遮于五也沙六也洛义十萬也俱胝百億也那由他萬億也一云京也十億為京金剛經云八百四千萬億那由他諸佛注云那由他十億也阿僧祗無央數也央一作鞅余嘗著俚言解微塵之說附錄於此算法有微有塵釋典有極微塵七極微塵成一阿耨池上塵七阿耨塵為一銅上塵七銅上塵為一水上塵七水上塵為一兔毫上塵七兔毫上塵為一羊毛上塵七羊毛上塵為一牛毛上塵七牛毛上塵成一嚮遊塵七嚮遊塵成一蟣七蟣成一蝨七蝨成一橫麥七橫麥為一指二十四指為一肘四肘為一弓五百弓為一拘盧舍八拘盧舍為一由旬一弓八尺也五百弓四百丈也一拘盧舍二里也一由旬十六里也二十拘盧舍為一踰繕那四十里也從此至萬里實自極微塵積之耳大戴禮王言篇孔子曰布指知寸布手知尺舒肘伸臂也知尋十尋而索百步而堵三百步而里千步而井三井而句烈三句烈而距五十里而封百里而有都又小爾雅云一舉足謂之跬音奎半步也倍跬謂之步四尺謂之仞倍仞謂之尋倍尋謂之常五尺謂之墨倍墨謂之丈又孔叢子云兩手曰掬詩作匊一手曰溢禮記朝一溢米注云米一升二十四分升之一為一溢是儒釋計數皆自夫手足始也繫辭傳謂伏羲畫八卦近取諸身有旨哉通用類耨多羅一曰嗢呾羅上也阿提初也阿無也出息烏波有也那不也三正也藐等也優畢义平等也阿娑磨無等等也羅闍垢也婆娑提伽清淨也邏求輕也沒栗度耎也攝提假也陀摩善也歌利惡也優陀夷出現也彼茶必也多陀如也喝薩訛也夜他跋實也那摩名也迦陀底也伽那厚也闍提闍羅一曰乞那生也阿耨波陀不生也阿闍世未生也阿羅和及拔早託生也闍陀伽本生也鼻豉迦種也拘那含牟尼寂也賖多一日尼樓陀滅也又寂滅總稱阿那律無滅也末剌𧬻一曰闍提闍生死總稱也义耶盡也婆伽破也伽車提一曰修伽陀去也火夜喚來也斯陀含一來也阿那含不來也摩訶大也地栗伽長大也分那柯滿也布剌拏圓滿也達梨舍那見也彌戾車惡見也鉢羅味奢入也尼延底深入也須陀洹入流也殺三摩婆離合也羅律貧也尼陀那因緣也漚和俱含羅方便也娑婆一切也薩婆多一切有也阿浮達摩未曾有也吒婆障礙也羅睺羅覆障也蔽尸凝結也健男凝厚也弗沙增盛也瞿曇純熟也婆度善哉也阿呼奇哉也未嗟羅慳也四毗含羅無慳也阿羅律無貧也尒焰所知也摩訶羅無知也阿閃無動也鉢健提堅固也附錄梵語九譯阿叱釐國南天竺所屬國也阿輸軋陁仙茅也阿月渾柵木實也狀如榛子又呼無名子勒佉一名渴稟紫𨥥也𨥥音礦樹上凝脂乃麒麟竭之類菴摩勒餘甘子也狀如枳橘尼俱律陀柳也疷野迦疷音邸又音枝諸獸膽也乾陀褐色也西域有乾陀木用其汁染僧衣故名蜜陀僧一名沒多僧此亦梵語華人習呼熟耳銀鉛滓也余著象教皮編鋟梓竟萬歷丁亥上元之夕夢與蕃僧談梵語倐爾虹霓滿天琉璃鋪地僧呼二童子趨前祝余壽一獻杯水一持五色花旋舞唱梵唄其聲閎亮如千磬齊鳴萬螺互發余遂驚覺時方五漏余神搖搖動也不能寐因憶佛經梵語舊有譯者九事遺未錄晨興附書梵譯卷後紀夢徵云環中迂叟識
