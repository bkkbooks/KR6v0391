body:
  text: 禪語釋迦牟尼佛西天佛祖涅槃會上以手摩胸告衆云汝等善觀吾紫磨金色之身瞻仰取足若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子世尊西天佛祖在靈山會上拈花示衆摩訶迦葉西天二祖微笑世尊云吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑迦葉脅尊者西天十祖示富那夜奢西天十一祖偈云真體自然真因真說有理領得真真法無行亦無止龍樹尊者西天十四祖座上現自在身如滿月輪因說偈云身現圓月相以表諸佛體說法無形形用辨無聲色闍夜多尊者西天二十祖至羅閲城語婆修盤頭弟子云我不求道亦不顛倒我不禮佛亦不輕慢我不長坐亦不懈怠我不一食亦不雜食我不知足亦不貪欲心無所希名之曰道般若多羅尊者西天二十七祖答東印度國王云貧道出息不隨衆緣入息不居蘊界文殊菩薩拈藥草示衆云此藥能殺人能活人跋陀禪師示生法師云一微空故衆微空衆微空故一微空一微空中無衆微衆微空中無一微寶志和尚云終日拈香擇火不知身是道場又云大道秪在目前要且目前難覩欲識大道真體不離聲色語言達磨大師東土初祖少林面壁九年欲返天竺命門人各言所得道副云如我所見不執文字不離文字而為道用師云汝得吾皮尼總持云吾今一見更不再見師云汝得吾肉道育云四大本空五蘊非有而我見處無一法可得師云汝得吾骨最後慧可禮拜依位而立師云汝得吾髓慧可大師東土二祖云是心是佛是心是法法佛無二僧寶亦然燦可大師東土三祖信心銘云至道無難唯嫌揀擇但莫愛憎洞然明白毫釐有差天地懸隔欲得現前莫存順逆逆順相爭是為心病不識元旨徒勞念靜圓同太虛無缺無餘良由取舍所以不如莫逐有緣忽住空忍一種平懷妥然自盡止動歸止止更彌動唯滯兩邊寧知一種一種不通兩處失功遣有沒有從空背空多言多慮轉不相應絶言絶慮無處不通歸根得旨隨照失宗須臾返照勝却前空前空轉變皆由妄見不用求真唯須息見二見不住慎莫追尋才有是非紛然失心二由一有一亦莫守一心不生萬法無咎無咎無法不生不心能由境滅境逐能沉境由能境能由境能欲知兩端元是一空一空同兩齊含萬象不見精粗寧有偏黨大道體寬無易無難小兒狐疑轉急轉遲執之失度必入邪路放之自然體無去住任性合道逍遙絶惱繫念乖真昏沉不好不好勞神何用疏親欲取一乘勿惡六塵六塵不惡還同正覺智者無為愚人自縛法無異法妄自愛著將心用心豈非大錯迷生寂亂悟無好惡一切二邊良由斟酌夢幻空花何勞把捉得失是非一時放却眼若不睡諸夢自除心若不異萬法一如一如體元兀爾忘緣萬法齊觀歸復自然泯其所以不可方比止動無動動止無止兩既不成一何有爾究竟窮極不存軌則契心平等所作俱息狐疑淨盡正信調直一切不留無可記憶虛明自照不勞心力非思量處識情難測真如法界無他無自要急相應唯言不二不二皆同無不包容十方智者皆入此宗宗非促延一念萬年無在不在十方目前極小同大忘絶境界極大同小不見邊表有即是無無即是有若不如是必不須有一即一切一切即一但能如是何慮不畢信心不二不二信心言語道斷非去來今道信大師東土四祖示法融禪師云百千法門同歸方寸河沙妙德總在心源一切戒門定門慧門神通變化悉自具足不離汝身一切煩惱業障本來空寂一切因果皆如夢幻無三界可出無菩提可求人與非人性相平等大道虛曠絶思絶慮如是之法汝今已得更無缺少與佛何殊更無別法汝但任心自在莫作觀行亦莫澄心莫起貪嗔莫懷愁慮蕩蕩無礙任意縱橫不作諸惡行住坐臥觸目隨緣總是佛之妙用快樂無憂故名為佛宏忍大師東土五師告衆云汝等各隨意述一偈神秀偈云身是菩提樹心如明鏡臺時時勤拂拭莫使惹塵埃惠能偈云菩提本無樹明鏡亦非臺本來無一物何處惹塵埃師說偈云有情來下種因地果還生無情既無種無性亦無生遂以衣法付惠能惠能大師東土六祖示內侍薛簡云明與無明其性無二無二之性即是實性實性者處凡愚而不減在賢聖而不增住煩惱而不亂居禪定而不寂不斷不常不來不去不在中間及其內外不生不滅性相如如常住不遷名之曰道慧忠國師六祖旁出上堂云青蘿夤緣直上寒松之頂白雲淡濘出沒太虛之中萬法本閒而人自鬧希遷禪師即南嶽石頭和尚嗣青原行思上堂云吾之法門先佛傳受不論禪定精進唯達佛之知見即心即佛心佛衆生菩提煩惱名異體一汝等當知自己心靈體離斷常性非垢淨湛然圓滿凡聖齊同應用無方離心意識三界六道唯自心現水月鏡像豈有生滅汝能知之無所不備時門人道悟問佛法大意師云長空不礙白雲飛寶通禪師湖州大顛和尚嗣希遷上堂云學道人須識自家本心將心相示方可見道多見時輩秪認揚眉瞬目一語一默驀頭印可以為心要此實未了吾今為汝諸人分明說出各須聽受但除却一切妄運想念現量即汝真心此心與塵境及守認靜默時全無交涉即心是佛不待修治何以故應機隨照泠泠自用窮其用處了不可得喚作妙用乃是本心大須護持不可容易惟儼禪師澧州藥山和尚嗣希遷博通經論嚴持戒律鼎州刺史李翱問如何是道師云雲在青天水在翱述偈云鍊得身形似鶴形千株松下兩函經我來問道無餘說雲在青天水在翱又問如何是戒定慧師云太守欲得保任此事直須向高高山頂立深深海底行閨閣中物捨不得便為滲漏宣鑒禪師常德德山和尚嗣龍潭信禪師擔青龍疏鈔出蜀至澧陽路逢婆子賣餅因息肩買餅點心婆指擔問金剛經道過去心不可得現在心不可得未來心不可得未審上座點那箇心師無語乃住龍潭焚疏鈔直詣溈山武陵太守薛廷望建古德禪院延師居之師上堂云若於己無事則勿妄求妄求而得亦非得也汝但無事於心無心於事則虛而靈空而妙若毛端許言之本末者皆為自欺何故毫釐繫念三途業因瞥爾情生萬劫羈鎖聖名凡號盡是虛聲殊相劣形皆為幻色汝欲求之得無纍乎及其厭之又成大患終亦無益又云一毛吞海海性無虧纖芥投鋒鋒利不動維摩經云佛以四大海水入一毛孔不撓魚鱉性彼大海水本相如故又云取三千大千世界如陶家輪著掌中擲過恆河沙國界之外其中人不覺不知不使人有往來相余謂此以心言也宣鑒之說本於此義存禪師雪峯和尚嗣宣鑒上堂云我若東道西道汝則尋言逐句我若羚羊挂角汝向甚麼處捫摸又示衆云此事不從唇吻得不從黃卷上得不從諸方老宿得合從甚麼處得也須子細宗一禪師即元沙師備嗣義存上堂云佛道閒曠無有程途無門解脫之門無意道人之意不在三際故不可升沉建立乖真故非屬造化動則起生死之本靜則醉昏沉之鄉動靜雙泯即落空亡動靜雙收顢頇一作瞞旰佛性必須對塵對境如枯木寒灰臨時應用不失其宜鏡照諸像不亂光輝鳥飛空中不雜空色所以十方無影像三界絶行蹤不墮往來機不住中間意名相無體道本如如法爾天真不同修證秪長虛閒不昧作用不涉塵泥箇中纖毫道不盡即為魔王眷屬句前句後是學人難處所以一句當天八萬門永絶生死直饒得似秋潭月影靜夜鍾聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事道人行處如火銷氷終不成氷箭既離弦無返回勢所以牢籠不肯住呼喚不回頭古聖不安排至今無處所若到這裏步步登元不屬邪正識不能識智不能知動便失宗覺即迷旨二乘膽顫十地魂驚語路處絶心行處滅直得釋迦掩室淨名杜口須菩提唱無說而顯道釋梵絶聽而雨花本來真淨動用語笑隨處了明更無缺少今人不悟箇中道理妄自涉事涉塵處處染著頭頭繫絆縱悟則塵境紛紜名相不實便擬凝心斂念攝事歸空閉目藏睛終有念起旋旋破除細想才生即便遏𭡠如此見解即是落空亡底外道魂不散底死人真真漠漠無覺無知塞耳偷鈴徒自欺誑這裏分別則不然也不是隈戶傍門句句現前不得商量不涉文墨本絶塵境本無位次權名箇出家兒畢竟甚麼急切盡一生去且如今誰是堪任受學底人仁者莫秪是記言記語恰與念陀羅尼相似踏步向前來口裏哆哆和和地被人把住詰問沒處去便嗔道和尚不為我答話恁麼學事大苦汝知麼有一般坐繩牀和尚稱善知識問著便搖身動手點眼吐舌瞪視更有一般說昭昭靈靈靈臺智性能見能聞向五蘊身田裏作主宰恁麼為善知識大賺人汝知麼我今問汝汝若認昭昭靈靈是汝真實為甚麼瞌睡時又不成昭昭靈靈若瞌睡時不是為甚麼有昭昭靈靈時汝還會麼這箇喚作認賊為子是生死根本妄想緣起我向汝道昭昭靈靈秪因前塵色聲香味等法而有分別便道此是昭昭靈靈若無前塵汝此昭昭靈靈同於龜毛兔角汝今欲得出他五蘊身田主宰但識取汝祕密金剛體汝還見南閻浮提日麼世人興營養身活命種種心行作業莫非皆承日光成立秪如日體還有許多心行麼還有不周遍處麼欲識金剛體亦須如是秪如舉山河大地十方國土色空明暗踪迹真如凡聖地獄人天秪是療狂子之方虛空向無改變大道豈有升沉悟則縱橫不離本際若到這裏凡聖也無立處若向句中作意則沒溺殺人若向外馳求又落空界如如向上沒可安排恰似焰爐不藏蚊蚋此理本來平坦何用剗除動靜揚眉是真解脫道不強為意度建立乖真若到這裏纖毫不受指意不差便是千聖出頭來也安一字不得又上堂云我今問汝諸人且承當得箇甚麼事在何世界安身立命還辨得麼若辨不得恰似捏目生花見事便差如今目前見有山河大地色空明暗種種諸物皆是狂勞花相變作顛倒知見夫出家人識心達本源故號為沙門汝今既剃髮為沙門相即便有自利利人分如今看著盡黑漫漫地墨汁相似自救尚不得爭解利人佛法因緣事大莫作等閒相似聚頭亂說雜話趁慣過時光陰難得可惜許大丈夫何不自省察看是甚麼事從上宗乘汝既承當不得所以我方便勸汝但從迦葉門接續頓超去此一門超凡聖因果超毗盧妙莊嚴世界海超釋迦方便門直下永劫不教有一物與汝作眼見何不急急究取宗乘是甚麼事不可由汝用工莊嚴便得去不可他心宿命便得去汝會麼秪如釋迦出頭來作許多變弄說十二分教如灌水大作一場佛事向此門中用一點不得用一毛頭伎倆不得如同夢事亦如寐語沙門出頭來不同夢事蓋為識得識得即是大出脫大徹頭人所以超凡越聖出生離死離因離果超毗盧越釋迦不被凡聖因果所謾一切處無人識得莫秪長戀生死愛網被善惡業拘將去饒汝鍊得身心同虛空饒汝到精明湛湛不搖處不出識陰古人喚作如急流水急流不覺妄云恬靜恁麼修行盡出他輪回際不得依前被輪回去所以道諸行無常直是三乘功果如是可畏若無道眼亦不竟究何似我如今更不教汝加工鍊行如今不恁麼更待何時元安禪師洛浦和尚嗣夾山會禪師僧問供養百千諸佛不如供養一箇無心道人未審百千諸佛有何過無心道人有何德師云一片白雲橫洞口幾多歸鳥盡迷巢良價禪師筠州洞山和尚嗣雲巖價師自唐大中末於新豐山接誘學徒厥後盛化豫章高安之洞山權開五位善接三根大闡一音廣宏萬品橫抽寶劒翦諸見之稠林妙叶元通截萬端之穿鑿又得曹山深明的旨妙唱嘉猷道合君臣偏正回互由是洞上元風播於天下故諸方宗匠咸共推尊為曹洞宗焉師因曹山辭別遂囑云吾在雲巖先師處親印寶鏡三昧今付於汝詞云如是之法佛祖密付汝今得之宜善保護銀碗盛雪明月藏鷺類之弗齊混則知處意在不言來機亦赴動成窠臼差落顧佇背觸俱非如大火聚但形文彩即屬染污夜半正明天曉不露為物作則用拔諸苦雖非有為不是無語如臨寶鏡形影相覩汝不是渠渠正是汝如世嬰兒五相皆具不去不來不起不住婆婆和和有句無句終不得物語未正故重離六爻偏正回互疊而為三變盡成五如莖草味如金剛杵正中妙挾敲唱雙舉通宗通塗挾帶挾路錯然則吉不可犯忤天真而妙不屬迷悟因緣時節寂然昭著細入無間大絶方所毫釐之差不應律呂今有頓漸緣立宗趣宗趣分矣即是規矩宗通趣極真常流注外寂中搖係駒伏鼠先聖悲之為法檀度隨其顛倒以緇為素顛倒想滅肯心自許要合古轍請觀前古佛道垂成十劫觀樹如虎之缺如馬之𮩴以為下劣寶几珍御以有驚異貍奴白牯羿以巧力射中百步箭鋒相直巧力何預木人方歌石女起舞非情識到寧容思慮潛行密用如愚黃魯但能相續名主中主師作五位君臣頌云正中偏三更初夜月明前莫怪相逢不相識隱隱猶懷舊日嫌偏中正失曉老婆逢古鏡分明覿面別無真休更迷頭猶認影正中來無中有路隔塵埃但能不觸當今諱也勝前朝斷舌才兼中至兩刃交鋒不須避好手猶如火裏蓮宛然自有冲天志兼中過不落有無誰敢和人人盡欲出常流折合還歸炭裏坐本寂禪師曹山和尚嗣良價僧問五位君臣旨訣師云正位即空界本來無物偏位即色界有萬象形正中偏者背理就事偏中正者舍事入理兼帶者𡨋應衆緣不墮諸有非穢非淨非正非偏故曰虛元大道無著真宗君為正位臣為偏位臣向君是偏中正君視臣是正中偏君臣道合是兼帶說乃作偈云學者先須識自宗莫將真際雜頑空妙明體盡知傷觸力在逢緣不借中出語直教燒不著潛行須與古人同無身有事超岐路無事無身落始終德止禪師圓通和尚嗣寶峯照禪師上堂云山僧二十年前兩目皆盲了無所覩唯聞人說青天之上有犬日輪照三千大千世界無有不遍之處籌策萬端終不能見二十年後眼光漸開又值天色連陰濃雲亂湧四方觀察上下推窮見雲行時便於行時作計較見雲住時便於住時立箇窠臼忽遇多知漢道何不向高山頂上去山僧却問那裏是高山頂上他道紅塵不到處是好箇端的消息諸仁者還會麼文偃禪師雲門和尚嗣雪峯義存是為雲門宗上堂云我事不獲已向你諸人道直下無事早是相埋沒了更欲踏步向前尋言逐句求覔解會千差萬別廣設問難嬴得一場口滑去道轉遠有恁麼休歇時此事若在言語上三乘十二分教豈是無言語因恁麼道教外別傳若從學識機智得秪如十地聖人說法如雲如雨猶被呵責見性如隔羅穀以此故知一切有心天地懸殊雖然如此若是得底人火不能燒口終日說事未嘗挂著唇齒未嘗道著一字終日著衣喫飯未嘗觸著一粒米挂著一縷絲雖然如此猶是門庭之說也須是實得恁麼始得若約衲僧門下句裏呈機徒勞佇恁直饒一句下句當得猶是瞌睡漢澄遠禪師香林和尚嗣文偃上堂云汝諸人盡是擔鉢囊向外行腳還識得性也未且問汝諸人是汝參學日久用心掃地煎茶遊山玩水汝且喚恁麼作自性諸人且道始終不變不異無高無下無好無醜不生不滅究竟歸於何處諸人知得下落所在也未若於這裏知得所在是諸佛解脫法門悟道見性始終不疑不慮一任橫行文益禪師清凉和尚嗣羅漢粲是為法眼宗南唐李主與師論道同觀牡丹花命師賦詩云擁毳對芳叢由來趣不同髮從今日白花是去年紅艷冶隨朝露馨香逐曉風何須待零落然後始知空師頌三界唯心云三界唯心萬法唯識唯識唯心眼聲耳色色不到耳聲何觸眼眼色耳聲萬法成辦萬法匪緣豈觀如幻山河大地誰堅誰變師頌華嚴六相義云華嚴六相義同中還有異異若異於同全非諸佛意諸佛意總別何曾有同異男子身中入正定女子身中不留意不留意絶名字萬象明明無理事清聳禪師靈隱和尚嗣文益上堂云十方諸佛常在汝前還見麼若言見將心見將眼見所以道一切法不生一切法不滅若能如是解諸佛常現前又云見色便見心且喚恁麼作心山河大地萬象森羅青黃赤白男女等相是心不是心若為心為恁麼却成物象去若不是心又道見色便見心秪為迷此而成顛倒種種不同於無同異中強生同異且如今直下承當頓豁本心皎然無一物可作見聞若離心求解脫者古人喚作迷波討源卒難曉悟德韶國師天台和尚嗣文益上堂云古聖方便猶如河沙祖師道非風幡動仁者心動斯乃無上心印法門今作麼生會祖師意莫道風幡不動汝心妄動莫道不發風幡就風幡通取莫道風動處是甚麼有云附物明心不須認物有云色即是空有云非風幡動應須妙會與祖師意旨有何交涉若於這裏徹底悟去何法門而不明百千諸佛方便一時洞了更有甚麼疑悟懷讓禪師南嶽和尚六祖法嗣示沙門道一云汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取舍汝若坐佛即是殺佛若執坐相非達其理道一禪師江西大寂和尚即馬祖嗣懷讓示衆云汝等諸人各信自心是佛此心即是佛心達磨大師傳上乘一心之法令汝等開悟又引楞伽經文以印衆生心地恐汝顛倒不自信此一心之法各各有之故楞伽經以佛語心為宗無為為法門夫求法者應無所求心外無別佛佛外無別心汝受吾教聽吾偈云心地隨時說菩提亦秪寧事理俱無礙當生即不生洪恩禪師中邑和尚嗣馬祖仰山問佛性師云我與汝說箇譬喻如一室有六窗內有一獼猴外有一獼猴從東邊呼猩猩猩猩即應如是六窗俱呼俱應仰山云和尚譬喻無不了知更有一事秪如內獼猴睡著外獼猴欲與相見且又如何師執仰山手云猩猩與汝相見了惟寬禪師興善和尚嗣馬祖唐憲宗召師至闕下白居易問既稱禪師何以說法師云無上菩提者被於身為律說於口為法行於心為禪應用者三其致一也譬如江河淮漢在處立名名雖不一水性無二律即是法法不離禪云何於中妄起分別白問既無分別何以修心師云心本無損傷云何要修理無論垢與淨一切勿念起白問垢即不可念淨無念可乎師云如人眼睛上一物不可住金屑雖珍寶在眼亦為病白問無修無念何異凡夫也師云凡夫無明二乘執著離此二病是為真修真修者不得勤不得忘勤即近執著忘即落無明此為心要云爾與孟子無助無忘之說相似自在禪師伏牛和尚嗣馬祖上堂云即心是佛是無病求藥句非心非佛是病藥對治句僧問如何是脫灑句師云伏牛山下古今傳龐蘊居士嗣馬祖偈云日用事無別唯吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號邱山絶點埃神通并妙用運水及搬柴懷海禪師即洪州百丈和尚與西堂智藏南泉普願同為馬祖入室弟子時號三大士上堂云靈光獨耀逈脫塵根體露真常不拘文字心性無染本自圓成但離妄緣即如如佛又云汝等先歇諸緣伏息萬事一切諸法莫記憶莫緣念放捨身心令其自在不被見聞知覺所縛不被諸境所惑自然具足神通妙用是名解脫人對一切境心無靜亂不攝不散透過一切聲色無有滯礙名為道人善惡是非俱不運用亦不愛一法亦不捨一法名為大乘人不被一切善惡空有垢淨有為無為世出世間福德智慧之所拘繫名為佛慧是非好醜是理非理諸知見情盡不能繫縛處處自在名為初發心菩薩便登佛地招賢禪師長沙景岑和尚懷讓𣲖上堂云我若一向舉揚宗教法堂裏須草深一丈事不獲已向汝諸人道盡十方世界是沙門眼盡十方世界是沙門金身盡十方世界是自己光明盡十方世界在自己光明裏盡十方世界無一人不是自己我嘗向汝諸人道三世諸佛法界衆生是摩訶般若光光未發時汝等諸人向甚麼處委悉光未發時尚無佛無衆生消息何處得山河國土來大安禪師潭州長慶和尚號懶安嗣懷海上堂云汝諸人各自有無價大寶從眼門放光照見山河大地耳門放光領采一切善惡音響如是六門晝夜常放光明亦名放光三昧汝自不識取影在四大身中內外扶持不教傾倒如人負重擔從獨木橋上過亦不教失腳且道是甚麼物任持便得如是且無絲毫可見志勤禪師靈聖和尚嗣大安初在溈山見桃花悟道偈云三十年來尋劍客幾回落葉又抽枝自從一見桃花後直至如今更不疑法員禪師大隨和尚嗣大安上堂云此性本來清淨具足萬德但以染淨二緣而有差別故諸聖悟之一向淨用而成覺道凡夫迷之一向染用沒溺輪回其體不二故般若云無二無別分無別無斷故普願禪師池州南泉和尚嗣馬祖上堂云然燈佛道若心相所思出生諸法虛假不實何以故心尚無有云何出生諸法猶如形影分別虛空如人取聲安置篋內亦如吹網欲令氣滿且說十地菩薩首楞嚴三昧得諸佛祕密法藏自然得一切禪定解脫神通妙用至一切世界普現色身或示現成等正覺轉大法輪生涅槃尚喚作所知愚極微細所知愚與道全乖希運禪師黃蘖和尚嗣懷海裴相國拓一尊佛像於師前請師安名師喚裴休相國應諾師云與汝安名竟從諗禪師趙州和尚嗣普願上堂云如明珠在掌胡來胡現漢來漢現把一枝草為丈六金身用把丈六金身為一枝草用佛是煩惱煩惱是佛又云未有世界早有此理世界壞時此理不壞靈祐禪師澧州溈山和尚嗣懷海是為溈仰宗上堂云道人之心質直無僞無背無面無詐妄心一切時中視聽尋常更無委曲亦不閉眼塞耳但情不附物即得從上諸聖秪說濁邊過患若無許多惡覺情見想習之事譬如秋水澄渟清淨無為淡濘無礙智間禪師香巖和尚嗣靈祐在南陽除草拋瓦擊竹作聲忽然省悟作頌云一擊忘所知更不假修持動容揚古路不墮悄然機慧寂禪師袁州仰山和尚嗣靈祐上堂云汝等諸人各自回光返照莫記吾言汝無始劫來背明投暗妄想根深卒難頓拔所以假設方便奪汝塵識如將黃葉止啼有甚麼是處亦如人將百種貨物與金寶作一鋪貨賣秪擬輕重來機所以道石頭是真金鋪我這裏是雜貨鋪有人來覔鼠糞我亦拈與他來覔真金我亦拈與他師示寂偈云一二二三子平日復仰視兩口一無舌即是吾宗旨義元禪師鎮州臨濟和尚嗣希運是為臨濟宗僧問真佛真法真道師云佛者心清淨是法者心光明是道者處處無礙淨光是三即一皆是空明而無實有如真正作道人念念心不間斷自達磨大師從西土來秪是覔箇不受人惑底人後遇二祖一言便了始知從前虛用工夫山僧今日見處與祖佛不別若第一句中薦得堪與祖佛為師若第二句中薦得堪與人天為師若第三句中薦得自救不了僧問如何是第一句師云三要印開朱點窄未容擬議主賔分又問如何是第二句師云妙解豈容無著問漚和爭負截流機又問如何是第三句師云但看棚頭弄傀儡抽牽全藉裏頭人又云我有時先照後用有時先用後照有時照用同時有時照用不同時先照後用有人在先用後照有法在照用同時驅耕夫之牛奪饑人之食敲骨取髓痛下針錐照用不同時有問有答立賔立主合水和泥應機接物師示寂偈云沿流不止問如何真照無邊說似他離相離名人不稟吹毛用了急須磨紙衣和尚即克符嗣臨濟師問臨濟如何是奪人不奪境濟云煦日發生鋪地錦嬰兒垂髮白如絲師問如何是奪境不奪人濟云王令已行天下遍將軍塞外絶煙塵師問如何人境俱奪濟云并分絶信獨處一方師問如何是人境俱不奪濟云王登寶殿野老謳歌師於言下領旨作四頌其一云奪人不奪境緣自帶淆訛擬欲求元旨思量反責麼驪珠光燦爛蟾桂影婆娑覿面無差互還應滯網羅其二云奪境不奪人尋言何處真問禪禪是妄究理理非親日照寒光淡山搖翠色新直饒元會得也是眼中塵其三云人境兩俱奪從來正令行不論佛與祖那說聖凡情擬把吹毛劍還如值木盲進前求妙會特地斬精靈其四云人境俱不奪思量意不偏主賔言少異問答理俱全踏破澄潭月穿開碧落天不能明妙用淪溺在無緣繼戒禪師淨因瞞菴和尚嗣智海師同圓悟法真慈受三大禪師并十大法師禪講千僧赴太尉陳良弼府齊時徽宗私幸觀之有善僧問諸禪云吾佛設教自小乘至於圓頓掃除空有獨證真常然後萬德莊嚴方名為佛嘗聞禪宗一喝能轉凡成聖則與諸經論似相違背今一喝若能入吾宗五教是為正法若不能入是為邪說諸禪視師師云法師所問不足當三大禪師之酬淨因小僧可使法師無惑也法師所謂五教者愚法小乘教乃有義也大乘始教乃空義也大乘終教乃不有不空義也大乘頓教乃即有即空義也一乘圓教乃不有而有不空而空義也如我一喝非唯能入五教至於工巧技藝諸子百家悉皆能入師震聲喝一喝問善僧聞麼答云聞師云汝既聞此一喝是有能入小乘教須臾又問聞麼答云不聞師云汝既不聞適來一喝是無能入始教師乃顧善僧云我初一喝汝既道有喝久聲消汝復道無道無則元初實有道有則而今實無不有不無能入終教我有一喝之時有非是有因無故有無一喝之時無非是無因無故無即有即無能入頓教須知我此一喝不作一喝用有無不及情解俱忘道有之時纖塵不立道無之時橫遍虛空即此一喝入百千萬億喝百千萬億喝入此一喝是能入圓教善僧拜謝僧復云非唯一喝為然乃至一語一默一動一靜從古至今十方虛空萬象森羅六趣四生三世諸佛一切聖賢八萬四千法門百千三昧無量法妙義契理契機與天地萬物一體謂之法身三界唯心萬法唯識四時八節陰陽一致謂之法性故華嚴經云法性遍在一切處有相無相一聲一色全在一塵中合四義事理周遍無餘參而不雜混而不一於此一喝中皆悉具足猶是建化門庭隨機方便謂之小歇場未至寶所殊不知吾祖宗門下以心傳心以法印法不立文字見性成佛有千聖不傳底向上一路師遠禪師梁山廓菴和尚嗣大隨靜公上堂舉楊岐三腳驢子話乃召大衆云這因緣如今叢林中商量者不少有般底秪道宗師家無固必凡有所問隨口便答若恁麼秪作箇乾無事會不見楊岐用處又有般底秪向佛邊會却與自己沒交涉又有般底秪向自己會棄却古人用處又消遣不下却似抱橋柱澡洗放手不得又有般底却向腳多少處會此病最難醫所以他語有巧妙處卒難摸索才擬心則差了前輩謂楊岐宗旨須是他屋裏人到恁麼田地方堪傳授這公案直須還他透頂徹底漢方能了得直須向威音那畔空劫已前輕輕覷著提起便行𭡠著便轉却向萬劫峯前進一步可以籠罩古今坐斷天下人舌頭聽我一頌三腳驢子弄蹄行直透威音萬丈坑雲在嶺頭閒不徹水流澗下太忙生湖南長老誰解會行人更在青山外宗杲禪師徑山大慧和尚嗣圓悟圓悟即照覺川勤上堂舉圓通秀禪師示衆云少林九年冷坐剛被神光戲破如今玉石難分秪得麻纏紙裹這一箇那一箇更一箇若是明眼人何須重說破徑山今日不免狗尾續貂也有些子老胡九年話墮可惜當時放過致令默照之徒鬼窟長年打坐這一箇那一箇更一箇雖然昔日叮嚀却是樹頭風過又云水底泥牛嚼生鐵憍梵鉢提咬著舌海神怒把珊瑚鞭須彌燈王痛不徹此前隆慶壬申集此後萬歷甲申增慧思禪師南嶽和尚志公同時示衆云道源不遠性海非遙但向己求莫從他覔覔即不得得亦不真偈云頓悟心源開寶藏隱顯靈通現真相獨行獨坐常巍巍百億化身無數量縱箇逼塞滿虛空看時不見微塵相可笑物兮無比况口吐明珠光晃晃尋常見說不思議一語標名言下當又云天不能蓋地不載無去無來無障礙無長無短無青黃不在中間及內外超羣出衆太虛元指物傳心人不會法常禪師荊州玉泉和尚嗣大寂答鹽官偈云摧殘枯木倚寒林幾度逢春不變心樵客遇之猶不顧郢人那得苦追尋又偈云一池荷葉衣無盡數樹松花食有餘剛被世人知住處又移茅舍入深居隱山禪師龍山和尚洞山師示洞山偈云三間茅屋從來住一道神光萬境閒莫把是非來辨我浮生穿鑿不相關齊安禪師黃州人上堂云言不落句佛祖徒施元韻不墜誰人得知僧問如何識得自己佛師云一葉明時消不盡松風韻罷怨無人又偈云猛熾焰中人有路旋風頂上屹然棲鎮常歷劫誰差互杲日無言運照齊鹿苑圭禪師潭州和尚上堂云凡有因緣須曉其宗若曉其宗無是無不是用則波騰海沸全真體以運行靜則鏡淨水澄舉隨緣而會寂且道兜率天宮幾人行幾人坐若向這裏辨得緇素許你諸人東西南北如雲似鶴於此不明踏破草鞋未有了日善會禪師夾山和尚嗣船子德誠上堂云有祖以來時人錯會相承至今以佛祖言句為人師範若或如此却成狂人無智人他秪指示汝無法本是道道無一法無佛可成無道可得無法可取無法可捨所以老僧道目前無法若向佛祖邊學此人未具眼何以故皆屬所依不得自在秪為生死茫茫千里萬里求善知識須具正眼求脫虛謬之見定取目前生死為復實有為復實無若有人定得許汝出頭上根之人若定不得中下根器波波浪走更聽一頌勞持生死法唯向佛邊求目前迷正理撥火覔浮漚法喜禪師令透和尚嗣翠微無學上堂云出家人須會佛意始得若會佛意不在僧俗男女貴賤但隨家豐儉安樂便得諸上座盡是久處叢林偏參尊宿旦作麼生會佛意若未會佛意直饒頭上出水足下出火燒身鍊臂聰明多辨聚徒一千二千說法如雲如雨講得天華亂墜秪成箇邪說爭競是非去佛法大遠諸人幸值色身安健不值諸難何妨近前著些工夫體取佛意印肅禪師號普菴袁州宜春人嗣溈山放菴忠公誦華嚴論大悟說偈云捏不成團撥不開何須南嶽又天台六根門首無人用惹得胡僧特地來自贊云悟無生法談不說禪開兩片皮垢地該天如何是佛十萬八千乾德禪師潭州大溈和尚僧問如何是祖師西來意師云水從山上出又問意旨如何師云溪澗豈能留又上堂云山花似錦文殊撞著眼睛幽鳥綿蠻觀音塞却耳際諸仁者更商量箇甚麼昨夜三更睡不著翻身促得普賢貶向無生國裏一覺直至天明今朝又得與諸人相見說夢噫是甚麼說話保宗禪師南嶽福巖和尚上堂云世尊周行七步舉足全乖目顧四方觸途成滯金襴授去殃及兒孫玉偈傳來挂人唇吻風幡悟性未離色塵鉢水投針全成管見祖師九年面壁不見纖毫盧公六代傳衣圖也小利江西一喝不解慎初德嶠全施未知護末南山鱉鼻謾指蹤由北院枯松徒彰風采雲門顧鑒落二落三臨濟全提錯七錯八若說君臣五位直如紙馬過江更推賓主交參恰似泥人澡洗獨超象外且非捉兔之鷹混迹塵中本是咬猪之狗何異跳坑墮塹正是避溺投置如斯之解正在常途出格道人如何話會豈不見陶潛俗子尚自覩事見幾而今祖室子孫不可皮下無血如漢禪師郢州大陽和尚示僧云聞聲悟道失却觀音眼睛見色明心昧了文殊巴鼻一出一入半開半合泥牛昨夜遊滄海直至如今不見回咄奉能禪師潭州衡嶽和尚上堂云宗風才舉萬里雲收法令若行千峯寒色須彌頂上白浪滔天大海波中紅塵滿地應思黃梅昔日少室當年不能退己讓人遂使舂糠答志斷臂酬心何似衡嶽這裏山畬粟米飯一桶沒鹽羹苦樂共住隨高就低且不是南頭買貴北頭賣賤直教文殊稽首迦葉攢眉龍樹馬鳴吞聲飲氣目連鶖子且不能為為甚如此諦觀法王法法王法如是希隱禪師郢州興陽和尚上堂云了見不見見了未了路上行人林間宿鳥月裏塔高十二層天外星纏五百秒要會麼手執夜明符幾箇知天曉真如禪師大溈慕哲和尚上堂云十方同聚會個個學無為此是選佛場心空及第歸示寂偈云昨夜三更風雷忽作雲散長空前溪月落崇哲禪師衡州開國和尚上堂云山僧有三印更無增減剩覿面便相呈能轉凡成聖諸人還知麼若也未知不免重重注破一印印空日月星辰列下風一印印泥頭頭物物顯真機一印印水捩轉魚龍頭作尾三印分明體一同看來非赤亦非紅互換高低如不薦青山依舊白雲中處真禪師鹿門和尚嗣曹山本寂上堂云一片凝然光燦爛擬意追尋卒難見瞥然撞著豁人情大事分明總成辦實快活無繫絆萬兩黃金終不見任他千聖出頭來總是向渠影裏現宏通禪師衡州育王和尚嗣本寂僧問心法雙忘時如何師云三腳蝦蟇背大象問如何是切急處師云針眼裏打筋斗審承禪師南嶽福巖和尚嗣大椽李相公問如何是祖師西來意師指庭前柏樹公如是三問師如是三答公作頌云出沒雲間滿太虛元來真相一塵無重重請問西來意唯指庭前柏一株慶預禪師隨州大洪和尚上堂云進一步踐他國王水草退一步踏他祖父田園不進不退正在死水中還有出身之路也無蕭騷晚籟松叉短游漾春風柳線長又云海風吹夢嶺猿啼月敢問諸人是何時節恁麼會得無影樹下任你遊其或未然三條椽下直須打法真禪師石門清涼和尚與大隨和尚同名上堂云柳已含煙春光回秀一峯孤峻萬卉爭芳白雲淡濘已無心滿目青山元不動漁翁垂釣一溪寒色未曾消野渡無人萬古碧潭清似鏡賔中有主拄杖橫挑日月輪主中有賔踏破草鞋赤腳走直得賔主互顯殺活自由理事渾融正偏不滯入荒田不揀信手拈來草且道如何委悉塵中雖有隱身術爭似全身入帝鄉法為禪師隨州大洪和尚上堂云法身無相不可以聲音求妙道無言不可以文字會縱使超佛越祖猶落階梯直饒說妙談元終挂唇齒須是功勳不犯影迹不留枯木寒巖更無津潤幻人木馬情識皆空方能垂手入鄽轉身異類却不道無漏國中留不住却來煙塢臥寒沙琳禪師真州長蘆和尚上堂云其宗也離心意識其旨也超去來今離心意識故品萬類不見差殊超去來今故盡十方更無滲漏當頭不礙徹底無依悟向朕兆未生已前用在功勳不犯之處平常活計不用躊躇擬議之間即沒交涉道遵禪師潭州南臺和尚上堂云從上宗乘合作麼生提綱合作麼生言論佛法兩字當得麼真如解脫當得麼雖然如是細不通風大通車馬若約理化門中一言才啓震動乾坤山河大地海宴河清三世諸佛說法現前於此明得古佛殿前同登彼岸悟通禪師蘄州北禪和尚上堂拈拄杖云過去未來現在三世諸佛微塵菩薩一時在拄杖頭上轉大法輪盡向諸人鼻孔裏過還見麼若見與我拈將來若不見大似立地死漢了然禪師浮梁林和尚嘗寓黃州定慧院東坡居士至院師云此間無坐榻居士來此作甚麼東坡云暫借師四大為坐榻師云山僧有一問居士道得即請坐道不得即輸腰下玉帶東坡欣然許之師云山僧四大本空五陰非有居士向甚處坐東坡不能答遂留玉帶師酬以靈山衲衣東坡作詩云百千燈作一燈光盡是恆沙妙法王是故東坡不敢借借君四大作禪牀又云病骨難堪玉帶圍鈍根仍落箭鋒機會當乞食歌姬院奪得雲山舊衲衣又云此帶閲人如傳舍流傳到我亦悠哉錦袍錯落猶相稱乞與佯狂老萬回紹宴禪師鼎州德山和尚上堂云一塵才起大地全收一毛頭上獅子全身且道一塵才起大地全收須彌山重多少一毛頭上獅子全身大海水有幾滴有人道得汝拄杖天下橫行若道不得須彌山蓋却汝頭大海水溺却汝身師戒禪師蘄州和尚僧問如何是佛師云鼻孔長三尺光祚禪師隨州智門和尚上堂云一法若有毗盧墮在凡夫萬法若無普賢失其境界正當恁麼時文殊向甚麼處出頭若出頭不得金毛獅子腰折幸好一盤飯莫待糝椒薑慧遠禪師鼎州德山和尚宋人與晉時遠公同名上堂云枕石潄流任運天真不見古者道撥霞掃雪和雲母掘石移松得茯苓當恁麼時復何言哉諸人要會麼聽取一頌雪霽長空逈野飛鴻斷雲片片向西向東節誠禪師潭州石霜僧上堂云心外無法法外無心隨緣蕩蕩更莫沉吟顯升禪師嶽州人上堂云大方無方含裹十虛至理不形圓融三際高超名相妙體全彰迥出古今真機獨露握驪珠而鑑物物物流輝擲寶劍以揮空空空絶迹把定則摩竭掩室淨名杜嗣放行則拾得搖頭寒山拊掌且道是何人境界拈拄杖一卓云瞬目揚眉處憑君子細看乾廣禪師襄州乾明和尚上堂云日頭東畔出月向西邊沒來去急如梭催人成白骨山僧有一法堪為保命術生死不相干打破精魂窟咄咄是何物不是衆生不是參佛自齡禪師夾山和尚上堂云便乃忘機守默已被金粟占先擬欲展演詞鋒落在瞿曇之後離此二途作麼生是衲僧透脫一路志璿禪師潭州雲峯寺祖澄和尚上堂云休去歇去一念萬年去寒灰枯木去古廟香爐去一條白練去山僧不休去不歇去業識茫茫去七顛八倒去十字街頭鬧浩浩地聲色裏坐臥去三家村裏盈衢塞路荊𣗥裏游戲去刀山劍樹劈腹剜心鑊湯爐炭皮穿骨爛去如斯舉唱大似三歲孩兒輥繡毬應圓禪師平江長慶和尚上堂云寒氣將殘春日到無索泥牛皆𨁝跳築著崑崙鼻孔頭觸倒須彌成糞掃牧童兒鞭棄了懶吹無孔笛拍手呵呵笑歸去來兮歸去來煙霞深處和衣倒良久又云切忌睡著慧和禪師南嶽祝融和尚上堂云未升此座已前盡大地人成佛已畢更有何法可說更有何生可利况菩提煩惱本自寂然生死涅槃猶如昨夢門庭施設誑呼小兒方便開門羅紋結角於衲僧面前皆成幻惑且道衲僧有甚麼長處善直禪師即一菴和尚德安雲夢人嗣妙喜上堂云諸佛不曾出世人人鼻孔撩天祖師不曾西來箇箇壁立千仞高揖釋迦不拜彌勒理合如斯坐斷千聖路頭獨步大千沙界不為分外若向諸佛出世處會得祖師西來處承當自救不了一生受屈留守陳丞相俊卿會諸山茶話陳舉有句無句如藤倚樹公案諸山皆答以奇語師最後云張打油李打沖不打渾身只打頭陳大喜祖瑃禪師大溈和尚嗣溈山上堂云道無定亂法離見知言句相投都無定義自古龍門無宿客至今鳥道絶行蹤欲會箇中端的意火裏蝍蟟吞大蟲萬壽念禪師郴州人歲旦上堂云往復無際動靜一源含有德以還空越無私而逈出昔日日今日日照無兩明昔日風今日風鼓無兩動昔日雨今日雨澤無兩潤於其中間覔去來相不可得何故自他心起起處無蹤自我心忘忘無滅迹大衆若向這裏會去與天地而同根共萬物為一體若也未明山僧為你重重頌出元正一古佛家風從此出不勞向上用工夫歷劫何曾異今日元正二寂寥冷淡無滋味趙州相喚喫茶來剔起眉毛須瞥地元正三上來稽首各休談若問香山山裏事靈源一𣲖碧如藍寧道完禪師德安州應城人僧問雲從龍風從虎未審和尚從箇甚麼師云一字空中畫又問得恁麼奇特師云千手大慈提不起四祖仲宣禪師蘄州和尚上堂云諸佛出世為一大事因緣祖師西來直指人心是佛凡聖本來不二迷悟豈有殊途非涅槃之可欣非生死之可厭但能一言了悟不起座而即證無生一念回光不舉步而遍周沙界如斯要徑引曰宗門山僧既到這裏不可徒然乃舉拂子云看看山河天地日月星辰若凡若聖是人是物盡在拂子頭上一毛端裏出入遊戲諸人還見麼若向這裏見得分明更須知有向上一路如何是向上一路六月長天降大雪三冬嶺上火雲飛佛照覺禪師嶽州君山和尚上堂舉仰之彌高四句諸人還識得麼若也不識為汝注破仰之彌高不隔絲毫要津把斷佛祖難逃鑽之彌堅真體自然鳥啼花笑在碧巖前瞻之在前正路非偏十方坐斷威鎮八千忽焉在後一場漏逗堪笑雲門藏身北斗咄了訔古誾字禪師號鼎菴德安府應城四聖和尚上堂云佛聖降生西乾現百億種神異作百億種方便不過曲為羣生發明本體而已外此別無第二事吾今為汝保任此事且道如何是此事良久云秋樹送蟬無密葉春林留蝶有餘花此個道理乃人入現成三昧無一點餘法令爾等尋討且不是尋討的物不奈爾等顛倒反向他人求覔受多少辛苦轉求轉遠又云爾輩放不下信不及逗到髮白面皺力盡神衰反觀平昔所為一點也用不著爾輩莫如趁今色身康健強放下些子向二六時中孜孜參個四大分散時向何處安身立命話頭正當參時不要前思後想才有思想便攙奪將去及至挽得回時早是粘泥帶水所以定參之時不容有第二念如此久久純熟自然省力驀然洞明則安身立命處一一瞞爾不得僧問念佛甚無靈驗師云只為汝等信心不篤緣想未忘執是執非滯無滯有終日說念佛實無念佛之心故見無靈驗及遇善知識又不肯咨其䇿進反尋他短長實自障耳古云或是或非人不識逆行順行天莫測此等應用二乘尚不能曉況汝輩乎汝要靈驗須向初發心時立定腳根樹大志節若不見佛誓必不休遇善知識又起咨訪不以彼此形迹自障心地只欲同躋妙道然後念佛之心了無差別恁麼念工日切無有不靈驗者又云近代有等聰明之士說禪禪會說教教會及遇善惡境緣不能無惑蓋為當初不曾做得一番死工夫只以聰明之資搜求諸家語句博覽百氏詞章穿鑿在心評論在口及遇境逢緣不免改顏變色倏忽老病臨頭依舊黑漫漫地此事不是說了便休貴須行到始得古云入門易出門難
