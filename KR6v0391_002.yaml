body:
  text: 名數一隻履初祖達磨也一隻臂二祖也一罪身三祖也一隻虎四祖也一株松五祖也一隻碓六祖也天龍一指迦那一鍼曹溪一句馬祖一喝藥山一笑水源一踏德山一拄黃蘖一掌紙衣一裘釋迦拈一花石頭垂一足臨濟一隻眼歸宗一味禪一剎那者一念時也一大刼者十方三世所有一切世界皆具成住壞空四刼連轉八十轆轤結算一十三萬四千四百萬年為始終之極數是為一大刼也一佛剎者一日月周行四天下光明所照是為一世界如是千世界中有千日月千須彌山王四千天下四千大海四千惡道千閻羅王千四天王千叨利天至千梵天是為小千世界爾所小千世界是為中千世界爾所中千世界是為三千大千世界如是世界周匝成壞眾生所居名為一佛剎也此說盖自騶衍談天推廣出來二諦者真諦俗諦也二輪者生輪死輪也二教者頓教漸教也二種善機者一感天人化報一感佛道果報也二種因果者世間集因苦果出世道因滅果也善行惡行為集因三界六道九有四生為苦果念佛法門為道因九品化生淨土成佛為滅果西方二宗者一宗無著天龍一宗龍樹提婆也東土二宗者南宗北宗也二身者色身法身也二出家者身出家心出家也二甘露門者一佛大先一達磨也禪有二病者一緣慮一昏住也治病亦有二藥一寂寂一惺惺也寂寂治緣慮惺惺治昏住參禪有二病者一騎驢覔驢一騎驢不肯下也既識驢却不肯下此病更難醫若解下驢方喚作無事道人二恨者在家嫌恨出家寂恨也二伴者在家妻伴出家心伴也二幢者在家持魔幢出家持佛幢也二障者想相為塵障識情為垢障也二障遠離則法眼清明又圓覺經有事理二障二種法身者真實身權應身也二緣二風者應逆緣多觸衰風應順緣多觸利風也二無我者人無我法無我也二種生住滅者流注生住滅相生住滅也二種用心者其一不見一切物得空惟見空不見物其一見一切物得空了了見一切有不住子有了了見一切空不住于空也迷人二貪者其一貪存日虛榮虛利乃有中之空其一貪沒後虛名虛飾乃空中之空也入道二堅者信他言入道名堅信自思惟入道名堅法以定入道名堅信以慧入道名堅法二業者慧業福業也了知住無所住心得無所得法名慧業日積課誦之功希求豐報之利名福業三心者過去心現在心未來心也皆妄心三戒者貪嗔癡也貪致老嗔致病癡致死是名三毒三明者一天眼二宿命三漏盡也三境者一性境二常質三獨影也三乘者小乘大乘最上乘也圓覺以十二緣為乘菩薩以六度為乘聲聞以四諦為乘亦名三乘三掉者身好遊走口好吟誦意好思惟也三元三句者體中元函盖乾坤句句中元隨波逐流句元中元截斷眾流句三車者聲聞乘為羊車辟支乘為鹿車大乘為牛車也三智者真智內智外智也真智本來寂靜通達無涯內智自覺無明割斷煩惱外智分別根門識了塵境三諦者中諦真諦俗諦也中諦統一切法真諦泯一切法俗諦立一切法三身者清淨法身圓滿報身百千億化身也三句法門者無憶戒無念定無妄慧也三藏者經律論也三寶者佛法僧也又名三歸三業者身口意也三有者欲有色有無色有也三緣者一了自己輪廻生死二紹隆三寶三解脫六道四生也三際者五蘊九識十八界也僧有三輩者坐禪為上輩誦經為中輩助眾為下輩也三長齋月者正五九也天以大寶鏡輪照四大洲此三月照南贍部洲宜修福袈裟三色者青色黑色木蘭色也三衣者一僧梨即大衣二鬱多羅即七條衣三安陀會也即五條衣鉢三色者孔雀色黫色黫音因即字鴿色也三種滲漏者一見滲漏機在離位墮入毒海二情滲漏滯在向背見處偏枯三語滲漏究妙失宗機昧終始也三刼者饑饉疾疫刀兵也三自性者妄想自性緣起自性成自性也不結夏有三累者一無事遊行妨修出業一損傷物命違慈實深三所為既非故招世謗也屋裏三界者一念心貪是欲界一念心嗔是色界一念心癡是無色界也三觀三成者一空觀破見思惑證一切智成般若德二假觀破塵沙惑證道種智成解脫德三中觀破無明惑證一切種智成法身德智慧三利者以智慧劍破煩惱賊以智慧刀裂煩惱網以智慧火燒煩惱薪也學道有三大者一圓明觀智之大二堅剛斷力之大三馴柔幹志之大也覺有三勿者一已往事勿追思二未來事勿迎思三見在事勿留念也三倒者一倒心二倒想三倒見也三塗者一火地獄二血餓鬼三刀畜生也又一色欲二識欲三貪欲是為三門亦名三塗四威儀者行住坐臥也四生者胎卵濕化也四緣者地水火風也虹霓四緣者地虹黃水虹青謂屈寬火虹赤風虹輪也謂日月暈一境四見者天見是琉璃人見是水鬼見是膿血魚見是窟宅也四果者須陀洹為入流果斯陀含為一來果阿那含為不來果阿那漢為無生果也四大神洲者東弗婆提南贍浮提西瞿那尼北鬱單越也四歡喜法者一檢素二習積梵行三無悔四樂斷樂修也四經四宗者維摩經以不思議為宗金剛經以無住為宗華嚴經以法界為宗涅槃經以佛性為宗也四觀者觀生觀住觀異觀死也觀生如石女之懷兒觀住如陽燄之翻浪觀異如浮雲之萬變觀死如狂花之謝空佛道四如者如連環不可解如貫珠不可雜如懸鏡不可掩如通川不可遏也學禪四如者行如風住如松坐如鍾臥如弓也四諦者苦集滅道也苦謂一切生老病死之類集謂一切積聚肉骨財帛之類滅謂滅壞道謂修行四諦謂審諦四者之理非徒說也經云見苦斷集因滅修道四大四歸者毛髮爪齒皮肉筋骨腦髓垢色歸於地唾涕膿血涎沫津液痰淚精氣大小便利歸於水煖氣歸火動靜歸風也四無量心者慈悲喜捨也四恩者一父母二師長三國主四施主也四牛圖者一調伏二回頭三變白四還源也一洲四主者南海名象主西海名寶主北海名馬主東海名人主也四刼者一成二住三壞四空也天帝四化者東門化為病兒南門化為老人西門化為死人北門化為沙門也佛心四化者以空化執為智化以福利化欲為仁化以緣業化妄為術化以地獄化愚為刼化也善知識能四回者回三毒為三聚淨戒回六賊為六神通回煩惱作菩提回無明作大智也身心四類者一身出家心不出家補特伽羅正信出家身參法侶心猶顧戀所愛諸欲二身在家而心出家補特伽羅雖畜妻子止用上妙衣食珍寶而於諸欲不生躭染三身心俱能出家補特伽羅正信出家身參法侶於諸欲境心無顧戀四身心俱不出家也補特伽羅畜養妻子上妙受用深生躭染四法者一豁然悟空照破幻蘊情累不留苦惱二了然見性洞曉相續有情都是一真法界三凝然不動任其外緣所觸如八風之吹妙高山四寂然無思也如晏海澄湛絕識浪之騰起學法四念者一破相二觀空三見性四行道也出家四緣者一心緣深信樂欲此為根本二身緣無諸疾障事役三資緣有物足用有人善奉四山緣也運歷平寧心緣由己身資山三緣委命智慧四寶者一為度老病死海堅牢船二為黑暗中大明燈三為一切病者之良藥四為伐煩腦樹之利斧也修禪四種者一作異計忻上厭下而修者是外道禪二信因果不忻不厭而修者是凡夫禪三了正偏之道而修者是小乘禪四達人法二空而修者是大乘禪也四魔者一蘊魔二煩惱魔三死魔四天魔也四識住者一色識住二受識住三想識住四行識住也四流者欲流有流見流無流也四取者欲取見取戒取我語取也四執者生執不滅執斷執不常執也四縛者一貪二嗔三戒取四見取也不得解脫故名四縛又名四結四重罪者一殺二盜三淫四妄也五陰者色受想行識也即五蘊五蘊五如者色如聚沫受如水泡想如陽燄行如芭蕉識如幻事也五結者曰色愛曰無色愛曰無明曰掉曰慢也五樂者慈心悲心息心淨心善心也五苦者貪心嗔心癡心慳心殺心也五濁者刼濁見濁煩惱濁眾生濁命濁也五盖者貪欲嗔恚癡眠調戲疑悔也五戒者不殺不偷盜不邪淫不妄語不飲酒也五戒五防者不殺防木不盜防金不淫防水不妄語防土不飲酒防火也戒有五寶者大疾病中戒為良藥大恐怖中戒為守護大暗昧中戒為明燈墮惡道中戒為橋梁入苦海中戒為舟楫也五慳者一住處慳獨我在此不容餘人二家慳獨我出入此地不容餘人三施慳我於中獨得布施不容餘人四稱贊慳獨稱贊我不許稱贊餘人五法慳也獨我知此法不傳餘人五法身者一戒二定三慧四解脫五解脫知見也五者超出五陰戒超色陰定超受陰慧超想陰解脫超行陰解脫知見超識陰五通者道通神通依通報通妖通也水月空華影像無主為道通靜心照物宿命記持為神通乘符往來藥餌靈變為依通鬼神逆知諸天變化為報通狐狸老魅木石精靈為妖通五禪者凡夫禪外道禪小乘禪大乘禪最上乘禪也五精舍者一給孤園二靈鷲山三獼猴江四菴羅樹五竹林園也五宗者臨濟溈仰雲門曹洞法眼也修行須識五念者一故起念二串習念三接續念四別生念五寂靜念也五念停息名為一念相應五覺者一正覺洞分至理不入邪見二貞覺靈徹而見三圓覺覺之大成無所不備四等覺圓覺馴臻至極五妙覺也等覺之上即本覺施財五種者一至心施二信心施三隨時施四自手施五如法施也五不應施者一非理求財不以施物不淨故二酒及毒藥不以施亂眾生故三罝機羅網不以施惱眾生故四刀杖弓箭不以施害眾生故五音樂女色不以施也壞淨心故五不應為者一不為羅綱二不賣毒藥三不為釀具四不為摴蒱碁博五不為種種伎樂也財屬五家者曰水曰火曰盜曰縣官曰惡子也嚼楊枝五利者口不臭不苦除風除熱除痰飲也苾芻五義者一生不背日二冬夏常青三體性柔軟四香氣遠騰五引蔓布條也出尊勝經又善覺要覽云體性柔軟引蔓旁布馨香遠聞能療疼不背日光也五住地者貪恚慢嫉慳也五見者身見邊見取見戒見邪取見也五心者率爾心尋求心決定心染淨心等流心也五欲者一財二色三食四名五睡眠也畫牛五喻者一全體純白喻真性無染二首上漸黑喻迷真趨妄三全體純黑喻業垢嬰纏四首上漸白喻背妄歸真五又純白喻復本還源也五教者愚法小乘大乘始教大乘終教大乘頓教一乘圓教也五眼者肉眼天眼慧眼法眼佛眼也五波羅蜜者一布施二持戒三忍辱四精進五禪定也五法者一名二相三妄想四正智五如如也五衰者一衣服嚴具出非愛聲二自身光明忽然暗劣三於沐浴位水滴着身四本性囂馳今滯一境五眼本凝寂今數瞬動也五種大衰相者一衣染塵垢二華鬘萎悴三兩腋汗出四臭氣入身五不樂本座也六波羅蜜者一布施二持戒三忍辱四精進五禪定六智慧也又名六度六度六如者布施如船底持戒如船榜忍辱如篷簟精進如篙楫禪定如磓石智慧如船師也六度無心者一布施心不求果報二持戒心無所貪着三忍辱心忘人我四精進心無起滅五禪定心無依止六智慧心無取相也六通者曰天眼曰天耳曰地心曰宿命曰漏盡也六塵者色聲香味觸法也是為六根眼入色耳入聲鼻入香舌入味身入觸意入法是為六入又名六受六根樂六塵是為六想又名六愛又名六情禁六情者如勢狗鹿魚蛇猿鳥狗樂聚落鹿樂山澤魚樂池沼蛇樂居穴猿樂深林鳥樂依空眼貪色如狗耳貪聲如鹿鼻貪香如魚舌貪味如蛇身觸着如猿心緣法如鳥也六宗者一有相宗二無相宗三定慧宗四戒行宗五無得宗六寂靜宗也佛大勝多分別徒眾之號信有六大利者一為道元功德母二能長養諸善根三能超出眾魔路四能得入三摩地五能解脫生死海六能成就佛菩提也習禪六變者變褊忿為寬恕變粗獷為調柔變放逸為精嚴變感傷為適悅變熱惱為清暢變憂怖為愷康也六道者天道人道修羅道地獄道畜生道餓鬼道也六和者戒和同修見和同解身和同住利和同捨口和同應意和同悅也外道六行者一自餓二投淵三赴火四身座五寂默六牛狗等滅也六妙行者一厭下苦二厭下粗三厭下障四忻上淨五忻上妙六忻上出也六齊日者每月初八二十三十四二十九十五三十日也七支業者三身業四口業也法王七寶者金輪寶白象寶如意寶玉女寶主藏寶主兵寶紺馬寶也蓮花七寶者寶花開敷寶性無染寶香芬馥寶莖豎幢寶葉扶疎寶蕋光蕤寶臺堅住也雲有七德者一含水二電光三雷聲四歡喜五掩覆六普潤七清凉也七眾者曰比邱曰比邱尼曰式义摩羅曰沙彌曰室羅末尼此出家五眾曰優婆塞曰優婆夷此在家二眾合為七眾也七聖財者一信二精進三戒四慚愧五聞捨六忍辱七定慧也七者能資用成佛故名為財佛身七處平滿者謂兩手兩肩兩足及額也出十住論七施者一興立佛圖僧房堂閣二園果浴池樹木清凉三常製藥餌療救眾病四作堅牢船濟渡眾生五安設橋梁過度羸弱六近道作井渴乏得飲七造作圊廁便利僻處也又名七種心七淨華者一戒淨二心淨三見淨四度疑五分別道六行斷知見七涅槃也七使者一邪二我三常四斷五戒盜六果盜七疑也八部龍神者曰天曰龍曰夜义曰乾闥婆天樂神即翼星曰阿修羅與帝釋戰者曰迦樓羅金翅鳥神後訛為嘍囉曰緊那羅似人頭有角曰摩㬋羅伽大蟒神出觀音經注無常八喻者如東逝長波如西垂殘照如擊石星火如馳隙迅駒如風裏微燈如草頭朝露如臨岩朽樹如爍目電光也八功德水者一清二冷三香四柔五甘六淨七不咽八蠲病也八風者一利二衰三毀四譽五稱六譏七苦八樂也得可意事名利失可意事名衰不見前排撥名毀不見前讚美名譽見前讚美名稱見前排撥名譏逼迫身心名苦悅適心意名樂八解脫者一有色觀諸色二內無色想觀外諸色三淨勝解身作證四超一切色想滅有對想不思惟種種想入無邊空處五超一切空無邊處入無邊識處六超一切識無邊處入無所有處七超一切無所有處入非想非非想處八超一切非想非非想處入滅想處也法門心願八喻者高超徹見是樓閣含育利生名宮殿防非護善名欄楯清淨無染是蓮花徹底澄清謂之池隨方逐圓謂之水仁慈濟利謂之寶戒定慧謂之香也八重塔者一輪王二初果三二果四三果五四果六支佛七菩薩八佛塔也八垢者念煩惱不念煩惱念不念煩惱我煩惱我所煩惱自性煩惱差別煩惱攝受煩惱也八倒者無常計常無樂計樂無我計我不淨計淨常計無常樂計無樂我計無我淨計不淨也前為凡夫四倒後為二乘四倒合為八倒九如者如夢如響如光如影如像如空華如陽燄如尋香如幻師也九婦者水授婦財聘婦王旗婦自樂婦衣食婦共活婦須臾婦幽婚婦異果婦也九雲者寶蓮華雲堅固香雲無邊色樓閣雲種種色妙衣雲無邊清淨旃檀香雲妙莊嚴寶盖雲燒香雲妙鬘雲清淨莊嚴貝雲也九難者人離惡道得為人難既得為人去女即男難既得為男六根完具難六根完具生中國難既生中國值佛世難既值佛世遇道者難既得遇道興信心難既興信心發菩薩心難既發菩薩心無修無證難也九惱者見在愛見在僧見在惱過去愛過去僧過去惱未來愛未來僧未來惱也九結者一愛二恚三慢四無明五見六取七疑八嫉九慳也九有者四禪四定為八地合欲界一地為九有也因果不忘故名為有九品化生者上中下各生三品合為九品也十地者歡喜地離垢地發光地燄慧地難勝地現前地遠行地不動地善慧地法雲地也十色世界者銀色世界金色世界寶色世界妙色世界即兜羅綿世界蓮花色世界薝蔔花色世界優曇鉢羅花色世界金剛色世界頗黎色世界平等色世界也十法界者佛法界菩薩法界辟支法界聲聞法界天法界修羅法界人法界旁生法界餓鬼法界地獄法界也十苦者生苦老苦病苦死苦怨僧會苦恩愛別離苦求不得苦五陰盛苦富貴守護苦貧窮短乏苦也十身者自身眾生身國士身業報身聲聞身圓覺身菩薩身智身法身空身也十惡者身惡三殺生偷盜淫邪口惡四兩舌詈聲妄言綺語意惡三嫉嗔癡共十惡也十惡若止即為十善行十大弟子者一舍利弗智慧二目犍連神通三大迦葉頭陀四阿那律天眼五須菩提解空六富樓那說法七迦旃延論義八優婆離持律九羅睺羅密行十陀羅陀多聞也存想固形有十種仙者一地行仙堅固服餌而不休息食道圓成二飛行仙堅固草木而不休息藥道圓成三遊行仙堅固金石而不休息化道圓成四空行仙堅固動止而不休息精氣圓成五天行仙堅固津液而不休息潤德圓成六通行仙堅固精色而不休息吸粹圓成七道行仙堅固禁呪而不休息術法圓成八照行仙堅固思念而不休息思意圓成九精行仙堅固交媾而不休息感應圓成十絕行仙也堅固變化而不休息覺悟圓成是皆不修三昧別求妄念報盡還來散入諸趣十心者一信心真性明了二念心夙念無忘三精進心精明進趣四慧心智慧現前五定心寂妙常凝六不退心明性深入七護法心保持不失八回向心回光弗九戒心安住無為十願心也所往隨願十行者一歡喜行具佛妙德二饒益行利益眾生三無嗔恨行利物無拒四無盡行通達十方五離癡亂行事無差悞六善觀行異中現同七無着行塵剎不礙八尊重行皆第一義九善法行圓佛軌則十真實行也一真無偽十煩惱者一無慚二無愧三不捨四懈怠五昏沉六抱歎七放逸八失念九心亂十不正知也十纏者一忿恚二隱覆自罪三意識昏迷四五情暗起五嬉遊六三業躁動七屏處起罪不自羞八露處起罪不羞佗九財法不能惠施十佗榮心生熱惱也十一佛具者慈悲為佛眼正念為佛頭妙音為佛耳香林為佛鼻甘露為佛口四耨為佛舌六度為佛身四攝為佛手平等為佛指戒定為佛足種智為佛心也十一空能解者曰內曰外曰內有為曰外有為曰內無為曰外無為曰無始曰性無所有曰第一義曰空曰大也十一徧使者一不信二懈怠三不慚四不愧五多貪六多嗔七多癡八昏沉九放逸十慳吝十一毒害也十二因緣者無明緣行緣識緣名色緣六入緣觸緣受緣愛緣執緣取緣有緣生緣也十二處者見與色聽與聲嗅與香嘗與味身與觸意與法也十二類者因動有聲因聲有色因色有香因香有觸因觸有味因味有法六亂妄想成業性故十二區分由此輪轉也十二緣起滅者無明起行行起識識起名色名色起六處即六入六處起觸觸起受受起愛愛起執執起取取起有有起生生起老死惟無明滅故識滅識滅故名色滅名色滅故六處滅六處滅故觸滅觸滅故受滅受滅故愛滅愛滅故執滅執滅故取滅取滅故有滅有滅故生滅生滅故死滅也十二行法輪者示轉勸轉證轉各有苦集滅道四輪合為十二輪也六塵十二種者目塵明暗耳塵動靜鼻塵通塞舌塵甜苦身塵離合意塵生滅也出楞嚴經十三藏經者唐肅宗詔寫佛經數也凡三萬六千餘卷佛視有十三如者視王侯之位如過隙塵視金玉之寶如瓦礫視紈素之服如敝帚視大千界如一訶子視阿耨池如塗足油視方便門如化寶聚視無上乘如夢金帛視師道如眼前花視禪定如須彌柱視涅槃如晝夕寤視倒正如六龍舞視平等如一真地視興化如四時木也十六觀門者一日觀二水觀三地觀四樹觀五池觀六總觀上六門為依報七華座八像觀九佛身十觀音十一勢至十二普賢十三雜觀上七門為正報十四上品十五中品十六下品也上三門為三軰往生合為十六觀門昔唐宣宗問宏辯禪師今人念佛如何對曰如來出世為天人師隨根器而說法上根者聞最上乘頓悟至理中下者未能頓悟故權開十六觀門令念佛生於極樂又圭峯禪源序云念佛求生淨土須修十六觀門十六知見者一我起於我二我所生如父有子三受命根成就四命能舉事故五有情蘊和合生六養育因緣故長七眾數諸法有數八人妄計我是人九作手足所能十使作力能役佗十一起作後世業十二使起亦含陀十三作受苦樂果現十四使受厭於苦樂十五知五識名知十六現也目觀色相十八界者六根界六塵界六識界合十八界也十八羅漢一賔度羅墮闍尊者二迦伐蹉尊者三䟦釐墮闍尊者四蘇頻陀尊者五諾矩羅尊者六陀羅尊者七迦力迦尊者八闍羅弗多尊者九戌博迦尊者十半托伽迦尊者十一羅怙羅尊者十二那迦羣羅尊者十三因竭陀尊者十四伐羅波期尊者十五阿氏哆尊者十六住茶半迦托尊者十七提蜜多羅尊者十八賔頭盧尊者蓮社十八賢曰慧遠姓賈氏鴈門樓煩人曰慧永姓繁氏河內人曰慧持遠公弟也與兄同事道安曰道生姓魏氏鉅野人客居彭城曰佛陀耶舍尊者罽賔國婆羅門種曰佛陀陀羅尊者甘露飯王之裔曰慧叡冀州人曰曇順黃龍人曰道敬瑯琊王氏隨祖凝之守江州曰曇恒河東人曰曇昺姓陳氏穎川人曰曇詵廣陵人曰劉遺民名程之字仲思號遺民彭城聚里人漢楚元王之後曰雷次宗字仲倫南昌人曰宗炳字少文南陽人官任太子舍人曰張野字萊民官任治中曰張詮字秀碩張野族曰周續之字道祖鴈門廣武人二十難者貧窮布施難豪貴學道難棄命不死難得覩佛經難生值佛世難忍色忍欲難見好不求難被辱不嗔難有勢不陵難觸事無心難廣學博究難除滅我慢難不輕末學難心行平等難不說是非難會善知識難見性悟道難隨化度人難覩境不動難喜解方便難也二十五我者一具五緣曰持戒清淨曰衣食具足曰閒居靜處曰息諸緣務曰近善知識二訶五欲曰訶色訶聲訶香訶味訶觸三乘五盖曰貪欲曰嗔恚曰睡眠曰掉戲曰疑悔四調五事曰心不沉不浮曰身不緩不急曰息不澁不滑曰眠不節不恣曰食不饑不飽五行五法曰欲曰精進曰念曰巧慧曰一心總計二十五我方便也如來三十二相者一足下有平滿相猶如奩底地雖高下隨足所蹈坦然等觸二足下千輻輪文輞轂眾相無不圓滿三手足並皆柔軟如兜羅綿四兩足一一指間猶鴈王鞔網交絡文同綺畫五手足諸指圓滿纖長可愛六足跟廣長圓滿與趺相稱七足趺修高光滿與跟相稱八雙腨漸次纖圓如鹿王腨九雙臂平立摩膝如象五鼻十陰相勢鋒藏密猶龍馬十一毛孔各一毛生紺青宛轉十二髮毛端皆上靡右旋宛轉十三身皮細薄滑潤垢水不住十四身皮金色晃耀諸寶莊嚴十五兩足兩掌中頸雙肩七處充滿十六肩項圓滿殊妙十七膊腋悉皆充實十八容儀洪滿端直十九身相修廣端嚴二十體相量等圓滿如諾瞿陀二十一頷臆并身上半威容廣大如師子王二十二常光靣各一尋二十三齒相四十齊平淨密根深白逾珂雪二十四四牙鮮白鋒利二十五常得味中上味二十六舌相薄淨廣長能覆靣輪至耳髮際二十七梵音詞韻和雅隨眾多少無不等分二十八眼睫猶若牛王紺青齊整二十九眼睛紺青鮮白紅環間節皎潔分明三十靣輪猶滿月眉相皎淨如天帝弓三十一眉間有白毫相柔軟如絲白逾珂雪三十二頂上烏瑟膩沙高顯隆圓猶如天盖也出般若經又菩薩本經云佛身紫金色有三十二相傳燈錄云優填王思佛請目連運神通攝匠人俾雕佛像得三十二相三十三祖者一摩訶迦葉二阿難陀三商那和修四優婆毱多五提多迦六彌遮迦七婆須密多八佛陀難提九伏䭾密多十脇尊者十一富那夜奢十二馬鳴大士十三迦毗摩羅十四龍樹十五迦那提婆十六羅睺羅多十七僧伽難提十八伽那舍多十九鳩摩羅多二十闍耶多北天竺人二十一婆修盤頭二十二摩拏羅二十三鶴勒那二十四師子二十五婆闍斯多二十六不如密多二十七般若多羅東天竺人二十八達磨本名菩提多羅南天竺國王第三子也王姓剎利帝名香至有三子長名月淨多羅仲名功德多羅季即達磨大師梁普通七年至金陵是為震旦初祖二十九慧可三十僧璨三十一道信三十二宏忍三十三惠能也三十三天者四天王天在須彌山半凡四萬二千由旬其須彌山頂為帝釋天上一倍為夜摩天上為兜率陀天化樂天他化自在天梵眾天梵輔天大梵天少光天無量光天光音天少淨天無量淨天徧淨天福生天福壽天廣果天無想天無煩天無熱天善見天善現天色究竟天無邊空處天無邊識處天無所有處天非想非非想處天凡二十八天而四天王天之下又有日月星宿天常憍天持鬘天堅首天凡三十二種并帝釋天為三十三天也又忉利天自有三十三天宮云三十五佛者始金剛不壞佛終法界藏身阿彌陀佛五十三佛者始普光佛終釋迦牟尼佛共八十八佛人所常誦不詳載六十見者身邊二見五陰成二十歷過去見在未來三世凡六十見也六十四種惡口之業曰麄語軟語非財語妄語漏語大語高語輕語破語不了語散語低語仰語錯語惡語畏語吃語諍語讇語誑語惱語怯語邪語罪語啞語入語燒語地語獄語虛語慢語不愛語說罪咎語失語別離語利害語兩舌語無義語無護語喜語狂語殺語害語繫語𨳲音閉又音關語縛語打語歌語非法語自讚歎語說他過語說三寶等語也出大集經八十種好者一無見頂相二鼻高孔不現三眉如初月四耳輪輻相埵成五身堅實如羅那延六骨際如鈎鎖七身回如象王八行時足去地四寸印文現九爪如赤銅色十膝骨堅着圓好十一身清潔十二身柔軟十三身不曲十四指長纖圓十五指文藏覆十六脉深不現十七踝不現十八身潤澤十九身自持不逶迤二十身圓滿二十一容儀備足二十二容儀莊嚴二十三住處安無能動者二十四威振一切二十五一切樂觀二十六靣不長大二十七正容白不撓色二十八靣具滿足二十九唇如頻婆果色三十言音清遠三十一臍深圓好三十二毛右旋三十三手足滿三十四手足如意三十五手文明直三十六手文長三十七手文不斷三十八一切惡心眾生見者和悅三十九靣廣姝好四十靣淨如滿月四十一隨眾生和悅與語四十二毛孔出香氣四十三口出無上香四十四威儀如師子四十五進止如象王四十六行法如鵝王四十七頭如摩陀那果四十八一切身分具足四十九四牙白利五十舌色赤五十一舌薄廣五十二毛紅色五十三毛軟淨五十四眼廣長五十五手足有德相五十六髮色青珠五十七髮旋好五十八髮不亂五十九髮長好六十觀無厭足六十一眾生不能盡覩相六十二次第有因緣說法六十三發音報眾聲六十四隨眾生語言說法六十五說法不着六十六隨眾生音聲不增不減六十七不輕眾生六十八等視眾生六十九光照身而行七十四邊光各一丈七十一手足軟滑七十二身長七十三身大七十四身持重七十五身不傾動七十六細腹七十七腹不現七十八臍不出七十九手赤白如蓮花色八十孔門相具也菩薩本經云佛有大神力八十種好前知無窮却睹南極八十八使者欲界三十二色界二十八無色界二十八合八十八也九十八使者八十八使兼十纏也百法者其目有五一心法二心所有法三色法四心不相應行法五無為法心法八種心所有法五十一種色法十一種心不相應行法二十四種無為法六種合為百法也詳西域僧天親百法論百八煩惱者欲界等八十八使更加邪我等七使并不信懈怠等十一徧使合百有八也亦名百八見釋道安西域志云須剌國有五百沙彌真人寺傳燈錄云第二祖阿難將入滅雪山五百仙人飛空而至阿難為說法涅槃經云五百阿羅漢者佛弟子也昔有五百商人出海採寶值千盜攘去併剜其目日夜號痛有人告曰靈鷲佛氏能救汝苦引至大林精舍佛為說法證阿羅漢果散處山林分形顯化作福人間盖示人從生有貪因貪受苦因苦得報之意西湖遊覽志云杭州淨慈寺塑五百阿羅漢像其第四百二十二位阿濕毗尊者獨設一龕旁置籤筒側身偃蹇斜目覷人而笑婦人祈嗣者必詣此炷香不知何說也五百名位具經中繁不錄因本經云須彌山東天下名弗于人壽三百西天下名瞿耶尼人壽三百南天下名閻浮提人壽百歲北天下名鬱單人壽千歲長倍三天下人閻浮提今中國及四夷皆是也中國稱震旦又稱人國則自天竺名之為閻浮提之一耳佛滅度後遺法有正像末三等正法五百年像法一千年末法三千年值一千佛名紫幢值五百佛名蓮華值六十四佛名螺髻隋大業時佛經六千一百九十八卷唐開元時五千四十八卷宋雍熙時增新經凡九千五百卷戒生定定生慧慧生八萬四千法門天目語錄云八萬四千法門八萬四千智慧八萬四千功德皆由一念念佛心中出也名經云人或內心思惟外境染着有八萬四千諸塵勞門罪相無量阿含經云四天王天壽五百歲以人間五十歲為一日忉利天壽千歲以人間百歲為一日燄摩天壽二千歲以人間二百歲為一日兜率天壽四千歲以人間四百歲為一日化樂天壽八千歲以人間八百歲為一日他化自在天壽一萬六千歲以人間一千六百歲為一日摩身天壽三萬二千歲以人間三千二百歲為一日𣑽迦三天壽一刼光音三天壽二刼徧淨三天壽三刼果實三天壽四刼無想天壽五百刼無造天壽千刼無熱天壽二千刼善見天壽三千刼大善天壽四千刼色究竟天壽五千刼空處天壽一萬刼識處天壽二萬一千刼不用處天壽四萬二千刼有想無想天壽八萬四千刼龍樹菩薩入龍宮流傳天竺分八萬六千偈至中土一統志外夷火州有靈山在土魯番西北石皆黑紋如毛髮又有白石堆其石骨堅潤蕃人稱為十萬羅漢削髮涅槃之所白樂天撰蘇州重元寺碑文云蓮華經六萬九千五百五字維摩經三萬七千九十二字金剛經五千二百八十七字陀羅尼經三千二十字阿彌陀經一千八百字觀音經六千九百九十字密經三千一百五字心經二百五十八字是八種經具十二部合十一萬六千八百五十七字載容齋五筆彌勒佛當人壽八萬歲初會度人九十六億第二會九十四億第三會九十二億爾後度人無數名經所載諸佛如來菩薩尊者神僧萬八千六百七十餘名其專名定號亡論已中多泛稱者如諸佛則有一藏虛空佛十方佛十光佛十上光明佛六十光明佛六十功德寶佛六十寶作佛六十二毘留羅佛百金光藏香流佛三百同名大幢佛五百波頭摩王佛五百歡喜佛五百威德佛五百日王佛五百淨聲佛七百同名光莊嚴佛百千晃耀光明佛百千德光幢佛千光明佛千上光佛千近佛千香佛千迦葉佛千閻浮檀寶空藏佛千閻浮檀金佛千光靜住王佛千八百寂滅佛二千寶幢佛三千毘盧舍那佛八千堅精進佛八千威德佛八千然燈佛十千迦葉如意佛萬八千婆羅王佛三萬同名毘盧舍那佛四萬願莊嚴佛八萬四千名自在幢佛二億同名拘鄰佛百億微塵金剛藏佛百千億刼智慧嶽聲德佛如來則有過去七如來滅罪八如來八江河沙佛如來十一無垢世界等行如來十一江河沙諸佛土忍慧世界香盡如來十四江河沙諸佛上梵音世界梵德如來六十功德寶如來百燄光明胎藏如來五百上威德如來五百淨聲王如來五百普現如來五千佛土莊嚴德寶如來千光明如來千勢自在聲如來千八百寂滅如來三千毘盧舍那如來八千堅精進如來九千法莊嚴如來萬八千普護佛如來萬八千婆羅王如來三萬散華王如來十八億佛剎如來百億江河沙諸佛土水晶世界淨尊如來千億光明如來恒河沙寶如來菩薩則有十百光明火熾然菩薩千相菩薩日光千相如來東北西南百千萬億菩薩初會二會三會無量至于十會恒河沙數菩薩凡此名號皆泛稱無定者也
