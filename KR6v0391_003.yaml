body:
  text: 異談光異周昭王二十六年四月八日釋迦佛生五色光貫太微東天竺阿育王役鬼神碎七寶末造八萬四千寶塔命耶舍尊者舒指放光八萬四千道令捷疾鬼各隨一光盡處安置一塔遍娑婆界在震旦者十九所漢明帝永平三年勑蔡愔等西尋佛法十年以白馬䭾經像至洛陽十四年五嶽道士褚善信等表請與佛法較試時佛舍利光明五色直上空中旋環如蓋偏覆大衆映蔽日輪東晉咸和四年丹陽尹高悝獲金佛像於張侯橋側浦中此像舊在內宮供養常現光瑞時臨海人張系於海濱獲金銅蓮花趺以安高悝金佛之足儼然符會是夕像有光燭天寧康初道安至襄陽立檀溪寺建浮圖鑄銅像能起自行光明燭天秦主苻堅送外國金像彌勒道安設講一夕像光照室頂有舍利焉義熙初司徒王謐於東掖門見五色光穿地得金像高四尺許義熙末彭城吳鷹造寺廣求佛像偶過林間見僧持像云與吳鷹供養忽不見鷹奉像歸每放異光劉宋元嘉中江陵張僧定妹幼嗜佛法志欲出家嘗奉小金像而父母密許適邴氏女不知也及羔鴈既至女悲呼不就燒香伏地取死像遂放金光彌竟一村父兄驚異乃止不嫁大明中王𤥎舊奉觀音金像嘗寄揚都南澗寺𤥎忽夢像立於座隅即馳迎歸其夕南澗失十餘像為盜毀鑄錢也像至𤥎家每放光高二三尺齊永明中禪靈寺剎上放光陳太建二年建靈剎高十有五丈下安佛爪長二寸闊一寸藏諸寶篋光飛五色焰起一尋隋開皇十五年造連基浮圖下置舍利是年七月有神光自基下右繞露槃赫若爐焰仁壽初文帝因食於齒下得舍利以銀碗水浮其一出示百官須臾忽成二粒凡得十九粒放光耀日大業末慧祥禪講口際得舍利不辨棄地輒還口中疑是真身砧椎不碎放五色光唐貞觀中道昂嘗夜講無燈昂舉掌放光明照堂宇龍朔初高宗幸并州童子寺大像高十七丈後遣使送袈裟其像放大光明並出釋氏通鑑寺異河中唐述谷中有天寺常聞鍾聲晉太始中有人入山忽逢仙聖恍惚見寺釋鑑北齊天保初寶公從林慮往白鹿山失道日將暮忽聞鍾聲乃趨進見一寺門題靈隱寺寶進至西南隅牀上坐久忽聞東壁有聲仰視壁孔如井口大僧前後從孔中飛下約五六十人坐定各問今日齊處或言豫章成都長安隴右薊北嶺南五天竺等處動即千萬餘里末後一僧從空而下衆問來何遲答曰今日相公城東鑒禪師請會寶因振衣起曰鑒是寶和尚師也諸僧直視寶頃之已失靈隱所在寶坐柞木之下歸問尚統法師尚云昔佛圖澄造寺於此賢聖居之或現或隱山行者時聞鍾聲侯君素記武平五年圓通在鄴寺有客僧疾來投通給湯藥病愈辭去言鼓山竹林寺當相訪也是夏通往鼓山林木深茂過南嶺遇前客僧引通入寺見大和尚及諸僧通求住和尚未許通辭行二里返顧惟峯崿耳唐開元末法秀夢異僧勸置袈裟五百入終南山施回向寺僧遂造衣至山遍訪無回向寺偶逢一僧導行忽見崖畔朱門秀入見諸僧出衣遍施之其僧引秀入一空房曰此唐天子舊居也向好聲樂降為人主乃授僧玉簫袈裟各一囑曰持獻唐天子秀還表上元宗取玉簫調弄宛如夙御並釋鑑石晉天福中考功員外趙洙言其相識僧居襄州禪院與客僧法本久處法本自稱相山竹林寺住持寺前有石柱他日可相訪也別去僧後往訪之至山下逢人問竹林寺遠近其人遙指孤峯之側云彼處古有竹林寺今無院舍矣僧疑之仍往峯側見竹叢中有石柱初法本別時言扣石柱當有人應僧以小杖擊柱數聲俄然耳目開豁身在寺門法本出引僧度重門升祕殿參其尊宿尊宿云飲畢即出此無座位法本送僧至寺門而別天地昏暗宛在竹叢中石柱旁玉堂閒話衡山有潛聖峯僧希遁遊南嶽尋方廣寺訪慧海尊者忽見精舍號方廣遇尊者止宿送出反顧人宅俱無故稱潛聖云今衡山蓮花峯有方廣寺梁武帝建宋徽宗御書天下名山四字衡州志象異晉建興初有吉維衛迦葉二佛石像泛海入吳松江滬瀆口吳縣朱膺迎像登舟其輕如羽立於通安寺東晉咸和初蘇峻作亂宮闕煨燼獨太寧殿壁有明帝手畫佛像屹然不壞永和中有金像現於荊州司馬桓溫迎之不動時江陵滕峻令曇翼拜請飄然輕舉咸安初合浦人董宗之漁海中獲佛圓光獻于高悝所獲金佛之背吻合四十餘年靈像方足初太尉陶侃鎮廣州有海漁得文殊像送廣州寺嘗經火而像無恙侃後鎮武昌迎之舟沒失像及慧遠創東林寺心祈之其像泠然自至北凉沮渠蒙遜於凉州琢石岩設佛像又造丈六石佛於山寺承元二年子世興亡謂事佛無靈毀寺逐僧石像涕淚交流劉宋元嘉中孫彥曾家世奉佛妾王誦法華經見浦中有雜色掘得金像連趺高二尺餘南齊建元初宋王寺有丈八金像北境兵起像輒流汗又番禺毗耶精舍有扶南大石像七八十人舉之方動寺忽遇火三四尼試捧之飄然而起每有神光寇至則淚汗永明中有石從海浮入江取鑿為像坐高三尺餘又有石浮海入吳境朱法讓獻于朝造佛像高七尺餘是時有交州人獻一珠高二寸中含佛像凡臺座眉目皆具梁天監初立光宅寺鑄金銅丈八像匠疑銅不足忽有使者領銅十五車至鎔鑄便成高二丈二尺奏聞敕云初未送銅斯乃神感遂鐫花趺為記天監八年法悅造丈八無量壽佛匠初計四萬斤鎔瀉已竭尚未至胸馳聞給銅未至而爐側已有羊車載銅一鑄便滿人車俱失方知靈感及開模像踊成丈九大同初上虞民李𦙌掘地得一牙像方二寸一邊佛像十二軀一邊十五軀巧刻妙絶中有真形舍利六焉北齊晉州有靈石寺初僧護願造丈八石像見北谷一臥石令匠營造靣腹粗了而背著地難於舉起至夜石像自翻遂得造完移置佛堂至承光元年晉州陷像汗流地周兵入境燒諸寺塔此像獨不變色北周正光初立瑞像寺先是凉州御谷山雷震岩出石像高一丈八尺無首至是城東澗忽出光視之乃像首也奉安像身宛然符合遂名瑞像云隋仁壽初京城延興寺鑄丈六金銅佛像其日雨寶屑銀華香氣甚異是時法師元琬造丈六釋迦金像成天雨花狀如雲母大業中慧乘於東都畫龜兹國壇像屢感禎瑞福州南澗天王寺崖上有巨石唐天寶八年五月震雷劈石斬焉中開隱出貞像列侍環衛品覺有序莊嚴供養文物咸秩焉並釋鑑明朝洪武初虎林翁祥卿得一圓石大可六寸上現觀音大士妙嚴寶相坐寶蓮華善財童子合爪侍側學士宋濂有贊潛溪集經異晉太康初朱士行得道行經乃梵本也于闐王積火燔之火滅經存更覺鮮彩永嘉中安慧寫大品經入火不燒東晉隆安初僧開達登隴為羌所執置柵中待明日殺食之達唯誦觀音經忽有虎來羌各散走虎乃嚙柵成闕達因出柵得脫並釋鑑劉宋元嘉中荊揚大水惠慶船往廬山遇暴風船將覆惠慶專心念觀音經岸上之人望見船前若有數十人牽挽之狀遂得登岸法苑珠林太原王元謨失軍律當死夢人告曰汝誦觀音經千遍可免禍謨誦滿千遍將就戮將軍沈慶之諫免談藪齊建安王患瘻念觀音經不息夜夢觀音手為傅藥明旦瘡愈感應傳吳郡人沈甲被繫處死甲日誦觀音經臨刑刀刀自斷因而得放北魏普泰中博士盧景裕以從兄仲禮謀逆連坐繫晉陽獄景裕誦經枷鎖自脫名為高王觀世音報應記隋開皇中蔣州嚴恭請人寫法華經務在清淨有人從貸經錢一萬貸者船翻錢失恭入庫見錢有水濕後聞其事方知靈異大業中慧恭與同寺慧遠晉僧同名相別三十年遠問恭何所得恭云誦觀音普門經一卷乃結壇升座始發聲異香滿室及入聞天樂振空雨花滿地經訖花樂方散大業末智超誦法華經瓶水自溢唐咸亨初西京法海寺英禪師見異人來謁曰弟子知有水陸齊可以利益幽明自梁武沒後因循不行今大覺寺吳僧義濟藏此儀文願師往求以來月十五日於山北寺如法修設苟釋狴牢敢不知報英公詣義濟果得儀文以歸即以所期日修設次日將暮向者異人率十數輩來謝曰弟子即秦莊襄王也又指其徒曰此范睢穰侯白起王翦張儀陳軫皆秦臣也咸坐本罪幽囚陰府大夜冥冥無能救護昔梁武於金山寺設此齊前代紂王之臣皆免所苦弟子爾時亦得暫息以獄情未決不得出離今蒙師設齊弟子與此輩并列國諸侯衆等皆乘善力特生人間故此來謝言訖遂滅自是水陸儀文經懺布行於世長安初詔法藏於東都佛受記寺講新華嚴經至華藏世界品感大地震動即日召對長生殿指殿隅金師子為喻遂集其語為師子章先天元年元覺參曹溪六祖一見語合遽歸永嘉著證道篇即時定中見其字化為金色滿虛空界中和初溫州法空院僧慧升結廬北岩寫法華經至普賢勸法品天雨舍利二顆大順初溫州大雲寺僧洪楚誦經說法陸地生蓮靈蛇聽法並釋鑑無聞聰禪師香山人資福寺僧無礙請師注金剛經三十二分時有紫雲覆寺座下産靈芝所注經今存湖廣通志形異十四祖龍樹尊者至南印度祖於座上現自在身如滿月輪一切衆生惟聞法音不覩祖相有長者子名迦那提婆謂衆曰尊者現佛性體相以示我等言訖輪相即隱晉永嘉四年佛圖澄來洛陽自云百餘歲服氣能積日不食腹旁一孔常以絮塞之夜讀書則拔絮孔中出光照室又嘗至流水側腹孔引出臟腑洗訖還納腹內出晉書北魏普泰初僧照入滎山洞見神僧眉長尺餘隋大業初慧侃住栖霞寺往揚都偲法師所將還寺僧請見神力侃即從窗中出臂長數十丈後唐天成初常覺禪師居東京普淨院北鄰張生請師供養設榻留宿至夜張與妻竊窺見師體遍滿一榻頭足俱出榻外並釋鑑蹤迹異耆域天竺人晉永康中至襄陽將渡江舟人見其陋輕之不載比舟達北岸而域已先在岸矣前行見兩虎域以手摩其顱虎即去東晉永和初燉煌沙門單道開絶穀阜陵太守迎之道開步行從西平一日行七百里至秦州義熙中法顯遊天竺寓一寺忽有疾因思鄉飯其寺主遣沙彌為顯取之倐忽往還腳有瘡血云往彭城吳鷹家求食為犬所嚙顯怪其瞬息遊數萬里外方悟寺僧非常人也及還故往彭城訪鷹具知其由犬嚙餘血塗門之處猶在鷹聞顯言捨宅為寺並釋鑑杯渡不知姓名常乘大杯渡水因以為名與延賢寺法意道人相善往來莫測有吳都民朱靈期使高麗海風飄船九日至一洲邊洲上有山靈期等登山見寺甚麗乃竭誠拜寺僧設食菜味香美異常靈期等疑是真人乞速還鄉僧云此去吳都二十餘萬里因問靈期識杯渡道人否答云相識乃指北壁一壺及錫杖與鉢此是杯渡住處今作書以鉢寄之別有一青竹杖置船前水中各閉目靜坐自速至矣靈期等如所示惟聞船從山頂樹木上過三日至石頭淮水登岸見杯渡即送書鉢杯渡開書人莫識其字杯渡覽畢笑曰欲我還耶取鉢擲空中久之鉢下復接之曰我不見此鉢四千年矣後以鉢付法意道人世謂異物競往觀之高僧傳劉宋元嘉初道冏作普賢齊有二僧來禮佛出門飛去孝建中僧法朗多異迹能戶籥中出入大明初孝武造普賢像成於中興僧房設齊所請二百僧已集忽有異僧預坐齊主問住何寺曰天安言訖不見京兆尹孔靈表聞詔改禪房為天安寺梁天監末廣州何規采藥豫章胡翼山遇異人授慧印三昧經一卷令持與建安王言訖不見隋開皇中道英住大行山寺唐貞觀中住京師勝光寺英多異迹嘗入水宴坐六宿方出又值氷厚雪深乃曰此平淨處何得不睡仰臥三宿方起唐顯慶中千歲寶掌和尚居浦江寶岩與朗禪師友善和尚以白犬馳書禪師以青猴回使和尚自稱已一千七十二年自魏晉間抵此土計歷四百餘載咸亨中神僧萬回幼時能三千里致兄書朝往暮歸因名萬回開元中長者李通元著華嚴論成初長者自太原盂縣負經書而行途遇一虎曰吾將著華嚴論能為擇栖止處否即以經囊搭虎背隨至神福山土龕前蹲住長者乃於龕中著論每夕口出白光以代燈燭有二女子日汲𭥚炷香奉紙墨每食時輒具淨飯置長者前如是五載長者論畢滅迹不見大歷中有鄒和尚不知所自來跨白驢結茅居繖山所須鹽米薪菜之屬書寸紙繫錢緡遣驢負至市區人知為鄒也取平值挂物於鞍縱驢歸一日驢犯山下黃氏蔗苗黃請償於鄒鄒曰汝未知蔗糖為霜利當十倍試之果然造糖霜法始此鄒後走通泉縣靈鷲山龕中其徒追及但見文殊石像耳始知大士化身而白驢蓋獅子也興元初黃蘖希運禪師遊天台逢一僧與偕行屬澗水暴漲僧乃置杖褰衣涉波若履平地回顧云渡來師咄曰這自了漢吾早知當斫汝脛僧歎云真大乘法我所不及言訖不見大順中仰山慧寂禪師見異僧乘空而至作禮而立師問近離甚處僧曰早晨離西天師云何太遲僧曰遊山玩水師云神通妙用不如闍梨佛法僧曰特來東土禮文殊却遇小釋迦遂以西天貝多葉與師作禮乘雲騰空去後梁乾化初重靈暉禪師居洛中灘有癩僧求師洗摩師無難色俄有神光異香忽失癩僧貞明中龍湖普聞將他適以院寺付聰教二弟子乃跨虎凌晨抵信州齊僧方集師就長者覔齊長者不諾師覔水一盂噀拄杖為虎高馭而去後唐同光初京兆一和尚逐日沿江採蝦蜆充腹暮宿東山白馬廟紙錢中人稱為蜆子和尚或佯狂泥雪中去來無迹宋天聖初志言自壽春來居東京景德寺為人卜休咎書紙揮翰甚疾初不可曉後皆驗有具齊薦膾者則并食之臨流而吐化小鮮羣泳而去海客遇風且沒見僧操絙引舶而濟客至都下志言謂客曰非我汝奈何客記其貌真引舶者也並釋鑑元時黃衣和尚保康人每渡津即步行水面衣履不濕遇虎豹輒叱之而馭後莫知所終明朝洪武末狗陪禪師自四川遊至鄖陽盛水堰東古寺中每飯與一狗共食有人覘狗常於寺前水潭出入其後狗化龍僧乘之去並湖廣通志法術異阿羅竭天竺人晉太康中至洛陽時患疫竭為呪治多驗元康初止婁至山石室中去水甚遠竭以左腳碾石壁壁陷水出晉永嘉三年疫癘大作僧安慧符呪神水兩甕飲者即愈東晉太元初竺法曠應召住長干寺善禁呪治病有人見曠行住常有鬼神數十衛其前後法濟自陳世及隋二主皆在禁中呪水治病無不驗唐開元中三藏不空遊西域從普賢闍黎得金剛灌頂及大悲胎藏建壇之法其王有羣象奔逸不空坐於當路象至跪伏一行禪師素受里媼供養而媼子坐罪將刑媼泣請救師令弟子捕生物得雉豕七師日藏其一於甕中為梵語呪之七日北斗盡沒太史奏星變請禳之帝問師對曰此妖魔也若肆赦則妖滅遂大赦媼子得免師日出一豕則一星現至七日而斗復故元和中道樹禪師結茅壽州三峯有怪現化百端或現佛菩薩天仙等形或放光出響師至怪滅人問師何道術師云野狐作伎倆眩衆只消老僧不見不聞伊伎倆有窮老僧不見不聞無盡道明陳尊宿住開元寺嘗作草履潛施道路或貨履養母人稱為陳蒲鞋黃巢兵至師標大草履一隻於城門巢令人竭力舉之不能動遂捨城不攻而去並釋鑑開成初僧金剛仙西域人居清遠峽山寺能梵音善拘鬼魅制蛟螭錫杖一聲召雷立震後欲歸天竺乃於峽山潭畔搖錫而呪水開見底以張之有一泥鰍長三寸許躍入中語寺僧曰此龍也吾至海門以藥煮為膏塗足則渡海若履平地是夜龍王化白衣叟持黃金百兩餽寺僧懇請捨其龍金剛仙乃泛舶歸天竺太平廣記寶逵居靈隱山號剎利法師善持祕呪晉天福中浙江水溢激射湖山逵誦呪之後有偉人黑冠朱衣謂逵曰伍員復求雪耻爾師慈心為物員聞命矣自是潮擊西興而杭州東岸沙漲數里至今靈隱寺有印沙牀照佛鑑皆其遺跡西湖遊覽志餘宋明道中溆浦不知何許人與僧無本同遊松滋西塞坪值大潦猛獸迫人師乃卓錫合掌默呪有頃忽二赤鷲從西來翔飛諸猛獸奔散人咸異之即此建寺名曰靈鷲嘉祐中松滋有古鄉厲壇每風雨鬼悲號鄉人王仲仁欲禳之禪僧道清過仲仁家仲仁請清說法妖聲遂滅並荊州志滅度異晉元康初天竺僧阿羅竭居婁至山石室中比卒焚燒纍日尸不煨燼乃移還石室河南通志咸康中竹林寺尼淨檢見天女持五色花自空中來尼遂騰空直上東晉升平中單道開入羅浮山年百餘歲卒敕弟子置尸石室中後興寧初袁宏為南海太守登山見道開骸骨如生義熙中僧睿沐浴還座合掌而逝五色香煙從睿房出慧永示寂異香七日始散並釋鑑杯渡在彭城聞鳩摩羅什在長安歎曰吾與此子別三百餘年相見未期後羅什死於長安逍遙園姚興焚其尸而舌不爛出晉書劉宋元嘉中來那跋摩於祇洹寺奄化衆見一物如龍自牀直上空中法朗往龜兹國卒焚骸兩肩湧泉直上大明初僧慶於淨名像前焚衆見一物如龍升天大明末慧益焚身聞空中笳管異香芬苾江陵劉虬禮佛長齊注法華經齊建武初詔徵國子博士不就臨卒白雲起簷戶間又聞磬聲既卒香氣彌日梁天監中雙僧自南嶽往住黃庭觀白馬巖一日沐浴畢輕舉禪座宛然留月帔於松杉間數百年不壞隋仁壽初道幽夢天人稱天帝請師講經又以香注幽手中及覺掌中有香氣薰一寺諸僧來觀香煙滿牀幽奄然而逝衆見雲氣出戶騰空而上大業初元景法師卒囑沉骸水中衆乃葬於紫陌河深淵三日後沉骸處湧起沙墳高峻如山唐貞觀初道遜講涅槃經至請寄來生偈忽然而逝送柩於山有異花繞柩而生長一二尺可五百餘莖永徽初道信大師安坐而逝塔于山下逾年塔戶自開儀相如生門徒不敢復閉代宗時諡大醫禪師塔名慈雲開元初六祖至國恩寺跏趺而逝廣州都督韋據迎奉全身歸曹溪寶林寺建塔真身至今存焉溫州淨居寺尼元機嘗習定於平陽大日山石窟中開元中倒立而化法屬以生死顛倒語呵之應聲而仆將葬之夕風雷陰黯失其柩越二日有自大日來者云是夕空中有簫磬聲機柩已厝峯上其徒迎舍利歸葬建塔號圓明趙清獻公立碑記其事杭州文喜禪師乾寧中示寂塔於靈隱西塢天祐中兵叛廢其塔觀師肉身不壞髮爪俱長錢武肅王遣人封瘞乾元中僧無漏立化於禁中足去地尺許元和中道宏禪師將示寂自槦溪源立塔基謂溪流喧聒定體乃荷錫沿路振之溪流隨錫聲而遠塔前別為泉湧出其澗遂涸惠紹慕藥王燒身供養火發有一星大如斗直下煙中俄而上天衆謂天宮迎紹並釋鑑長沙縣西百餘里有青蓮花兩本生陸地掘地得瓦棺中有髑髏蓮生於齒頰間時有長老言昔有僧不知名氏誦蓮花經無疾而化遺令以瓦為棺云勸善書廖處知善化時有一婆每日誦金剛經于街市乞食夜則歸宿山阿忽數日不見乞食羣鴉噪集山上處令人往視之見婆懷金剛經傍岩坐化羣鴉銜土以覆之久而成墳因稱鴉葬婆湖廣通志元時張紹思嘉魚人為靜保寺僧辟穀數年出入乘白馬無轡隨以黑犬自甃石塔坐化法身至今猶存武昌志明朝永樂中黃陂僧祖庭住安陸石門寺素不識字禪定通慧能書善文辭及卒焚尸有舍利子今猶存德安志轉世異劉宋時侍中琅琊王珉與一胡僧相善僧曰我後身為公子一日僧死而珉産子名曰練始能言即解外國語𡨋報記唐武德中四祖徙住破頭山攝五祖宏忍出家初有道者在蘄州西山栽松四祖曰吾欲傳法汝年已邁汝若再來吾尚遲汝道者遂諾乃往黃海縣周家女子托生女子初在溪畔浣衣道者告欲寄寓女有許意歸而有孕父母惡而逐之無所歸傭紡里中已而生子以為不祥棄於水中明日視之逆流而上遂舉養之隨母乞食至七歲四祖出逢之喜而問曰子何姓曰姓即有不是常姓曰是何姓曰是佛性曰汝無姓耶曰姓空四祖知其不昧乞於母攜歸出家永徽中慧寬禪師示寂寬姓王父號三洞先生姊信相自幼能禪定先是龍懷寺曇相禪師臨終語弟子會曰吾報緣當生廣漢綿竹峯頂王氏家後七年汝來見吾言訖而逝其後會頗忘之偶夢相責負約會驚寤遂造峯頂而扣其扉寬問扣扉者誰會遽曰弟子會也寬笑曰何以知吾而稱弟子會曰得師聲猶昔日聲也遂見其父告以故奉寬再歸龍懷寺落髮神異日顯俗呼聖和尚寬自言十世為大僧著十生記今存並釋鑑天寶末西京離亂尚書王鄑擕弟鄂入蜀至利州百堂寺前鄂年十七忽云我曾有經一卷在此寺石龕內因令人相隨訪獲之并木梳猶存寺僧曰此我童子也較其死年日與鄂生年日不爽𡨕報拾遺大歷末洛陽惠林寺僧圓觀與諫議李公入三峽維舟山下見婦女輩出遊圓觀垂泣李公驚問圓觀曰其中孕婦姓王者是某託身之所孕三載未産以某未至也某往投生公三日後來視一笑為驗是夕圓觀卒而孕婦生子李公二日訪其家新兒一見即笑甘澤謠崔慎由年長未有子與長安寺老僧相善老僧曰某無能報公願以後身為公之子老僧卒而崔生子小名四八手文有衲僧二字玉堂閒話陳雲嶠泗州人陳平章之孫元至元五年為餘姚州同知就醫於杭寓赤山重陽日楊太史瑀邀張伯雨訪之偕游水樂洞雲嶠自言前身泗州寺僧戒行精嚴人呼為老佛一日呼侍者作血臟羹侍者曰老佛一世持齊何故思此老佛怒而去見陳平章索血臟羹啖畢歸寺別大衆而作偈曰撞開平屋三層土踏破長淮一片氷趺坐而逝舁龕淮河時氷合已久茶毗之際大震一聲河氷自裂陳平章閒坐廳事恍見老佛入堂中追問之則子舍已報誕子即我也是時伯雨作登高詩有云百年身付黃花酒萬壑松如赤腳氷楊太史和云方外弟兄存晚節人間富貴等春氷雲嶠笑曰我無氷字只有長淮一片氷耳明日雲嶠告卒蓋亦談破轉世之證西湖遊覽志餘法幢姓李黃梅永福鄉人幼為四祖寺僧將終謂其師智和尚曰吾投生廣濟余家是時廣濟余志五家生子及能言時乃云吾法幢也智公來問舊事并所遺舊物一一不爽人呼再來僧仍居前寺永樂中召住京師報恩寺黃州志余謂釋氏輪回之說儒家以為妄其實不然嘉靖甲辰余與年友萬全張子徵宴集張有外弟趙生在坐張云趙生前世趙某子為大同學增廣生暑月迎督學途中飲火酒大醉臥樹側僕以冷水澆其首遽爾氣絶魂遊溪邊見犬來畏為所嚙適有孕婦在旁即避身婦邊不覺入其婦孕中是晚婦産子生見己身為嬰孩即悟托生在此北地貧家産婦不坐月生子三日夫耘田婦為餉時有一犬在牀前生呼其婦曰爾出外須閉門勿使犬進傷我婦聞大駭報其夫歸云産妖子也夫執鋤作擊生狀問生何言生懼不敢言隱忍二三歲始言至五歲時見乘馬過者生呼其名曰我是某托生是爾母舅不知我父母妻子何似其人歸報生父母以錢二緡謝其夫婦攜生歸其妻未改醮也生未嘗從師凡前生所讀書一一能記作字亦與前生字相類今亦為增廣生云坐客西安張茂參成都王可庸各有詩歌紀其事此即羊祜探環文詹識毬之類也無關釋氏故不録於前乃若房琯前身為永上人東坡前身為戒禪師則詳載小說家矣禽異世尊遷象頭山入定鵲巢於頂劉宋太始中求那跋陀羅天竺人每食輒分食飛鳥鳥集其手中取食永明中僧卞善梵音嘗誦經有羣鶴下集階前經終則去唐貞元十七年韋皋鎮蜀有獻鸚鵡者皋受之蓋河東裴氏好佛嘗教此鳥念佛因示以六齊之禁若相契然至十九年七月此鳥卒爾不懌馴養者知其將盡乃鳴磬告曰將西歸乎為爾擊磬爾其存念一擊磬一稱彌陀佛十擊磬而十念成遂斂翼委足而絶皋命以火焚之得舍利十餘粒炯然耀目有高僧慧觀請以舍利造塔於靈山八月十四日皋記四川通志太和初欲罷緇徒斥佛書詔命將行會尚食厨吏修饌以鼎烹雞卵方舉火鼎下忽聞鼎中有聲極微如人言迫而聽之乃呼觀世音菩薩也音甚悽咽尚食吏以聞文宗命左右驗之亦然遂詔郡國各精舍塑觀音像宣室志宋時肅禪和耒陽人初為弓手催稅夜宿逋家逋家欲明日烹鵝以待鵝忽向和作人語云我明日當烹汝善視我天未明和即索逋家鵝去修行悟道後於慶雲寺立化鵝亦如之天竺沙門勒佉居廬山禽飛至掌中取食湖廣通志獸異梁普通初僧稠往懷州西王屋山聞兩虎交鬬咆響震巖稠以錫杖中解各散去河南通志唐貞觀初明淨遊天台日至村中化食回羣虎皆張口求食淨以匙抄飯納虎口中明日復如是山東通志開元中西菩提寺有長生猪十餘年矣忽然猪死僧焚之灰中得舍利百餘粒出紀聞藥王菩薩姓韋名古蘇勒國人開元末至中土施藥救人常以一黑犬自隨其後犬化黑龍負藥王冲天而去曇藏禪師住南嶽西園嘗養一犬甚靈異師常夜行犬銜師衣師即歸一夕有羣盜至犬來銜師衣師語盜曰茅舍有可意物一任將去盜感其言遂散後師自燒滅犬亦同時化南嶽志元和中性空至杭州南山距城十里將棲禪其間尋以無水將他往忽神人跪告曰師來我等邀惠甚大奈何棄去南嶽童子泉當遣二虎移來師無憂也翼日見二虎跑山出泉甘冽勝常性空因留建立伽藍即今大慈定慧禪院東坡守杭賦詩有虎移泉之句宋學士文集善覺禪師居潭州華林觀察使裴休訪之問有侍者否師喚大空小空二虎自菴後出師曰有客且去二虎咆哮而去合壁事類大中末終南山有僧住菴習定一日僧失袈裟乃見猴披在岩中蹲坐其後覷羣猴皆習定至今有五獼猴塔存焉中和初普聞禪師謁石霜諸和尚諸云逢乾即止遇陳便住師過昭武抵大乾問父老言有陳嗣隱其中師見陳乞入山種菜人謂師入山久不出恐為虎所食往視之見茅廬一所行者數人指呼百諾問師乃知行者皆虎所變山神所役也並釋鑑後梁乾化初釋法聰居襄陽白馬寺晉安王來部襄雍乃詣禪室見二虎侍側王不敢進聰以手按虎頭伏地閉目召王展禮王告境內虎災聰即入定須臾十七大虎至聰命弟子以布繩繫頸而去虎遂無害河南通志後唐天成初扣水澡光古佛居將軍岩嘗有二虎侍側長興中契如菴主隱於小界山清溪沖照二長老訪師夜見虎豹馴繞菴前並釋鑑空如禪師居陸渾山蘭若偶見野猪與虎鬬師以藜杖揮之曰不須相爭各弭耳散去朝野僉載普智江陵人號古山永樂末年採藥遇虎逐鹿智以袖拂虎曰物在天地間各欲遂其生耳虎即退成化初虎入黃屯寺衆僧驚走宗淳以手摩之虎去淳號一空有戒行並湖廣通志水蟲異隋文帝嗜蛤所食必兼蛤蜊忽有一蛤劈不開椎擊如故置諸几上夜有光及明肉自脫中有一佛二菩薩像帝聞之誓不食蛤酉陽雜俎唐太和中文宗好嗜蛤蜊一日御厨有劈不開者忽變菩薩像詔問惟政禪師師云應以菩薩身得度者即現菩薩身而為說法光啓中紙納僧惟亮自龜山來福州長溪築菴於龜湖禪院之前湖有大龜嘗載師渡湖師滅後龜化為石白馬泉有白龜常就法聰手取食聰曰此是雄龍又靈泉有五色鯉亦就手食聰曰是雌龍也並釋鑑曇超居靈苑山一定纍日忽見一人來禮曰弟子赤亭山土神也村民鑿山壞龍室羣龍忿誓三百日不雨今已百日田地枯涸欲屈救蒼生超許之乃至赤亭為龍祝願龍亦悔悟化為人見禮於超明日大雨西湖遊覽志餘余讀佛經奇怪之說甚多姑采數條附録異談卷末經云星宿城郭天之舍也以水晶為城七寶為宮懸在空中大風持之大者七百里中者五百里小者百二十里宮室園池如四天王天壽命亦爾又云四天王天居須彌山四埵皆高四萬二千由旬四天王身長皆半由旬壽五百歲以人間五百歲為一日一夜男娶女嫁一同人間又云忉利天居須彌山頂有三十三天宮王身長一由旬壽千歲飲食嫁娶一同人間其城縱橫八萬由旬九百九十九門又云炎摩天宮風輪所持在虛空中王身長四由旬壽四千歲食同下天亦有嫁娶執手成欲又云化樂天宮風輪所持在虛空中王身長八由旬壽八千歲食同下天亦有嫁娶熟視成欲又云日城郭方正二千四十里其高亦然日王坐方二十里導從音樂林觀浴池如忉利天日城繞須彌山東方日出南方日午西方夜半北方日入如是右旋更為晝夜復有長短日行稍南南方漸長北方稍短日行稍北北方漸長南方稍短月之城郭廣長千九百六十里其高亦然二分是銀一分琉璃又云阿修羅王立海中央以指覆月天下晦冥或覆日以晝為夜所謂日月食也又云大阿修羅王住須彌山北大海水懸在宮上為四風所持身長二萬六千里阿修羅九頭頭有千眼九百九十九手八腳踞海食淤泥及藕生一女端正挺特帝釋娶以為妻阿修羅帥諸鬼神與帝釋戰而奪其女為帝釋所敗入藕孔中阿修羅前世居海之濱河水漂溺隨流殆死既得免因發願願我後世身形長大一切深水無過膝者以是因緣得極大身四大海水不能過膝立大海中身過須彌手据山頂下觀忉利天宮以上經語胡致堂有辨余謂此皆釋氏寓言耳人能為善則天宮樂地壽命永久身體長大男女飲食惟其所願乃誘引世俗之說非真有此實事也
